<style>
  :root {
    --bg: #f4efe7;
    --surface: rgba(255, 252, 247, 0.92);
    --surface-strong: #fffaf3;
    --border: #e5d8c7;
    --text: #2f2419;
    --text-muted: #7b6a57;
    --accent: #b85c38;
    --accent-2: #a04428;
    --accent-soft: rgba(184, 92, 56, 0.12);
    --tag-bg: #efe2d1;
    --tag-text: #6e513d;
    --imp1: #a89a8e;
    --imp2: #5d9fc4;
    --imp3: #5a9968;
    --imp4: #d4853a;
    --imp5: #c94f4f;
    --filter-active-bg: #b85c38;
    --filter-active-text: #fff;
    --shadow: 0 2px 12px rgba(78, 50, 22, 0.07), 0 8px 32px rgba(78, 50, 22, 0.05);
    --shadow-sm: 0 1px 4px rgba(78, 50, 22, 0.06);
    --radius: 14px;
    --radius-sm: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #13100e;
      --surface: rgba(30, 25, 22, 0.94);
      --surface-strong: #1e1915;
      --border: #342b26;
      --text: #f0e6da;
      --text-muted: #b09880;
      --accent: #e8965a;
      --accent-2: #d07a3e;
      --accent-soft: rgba(232, 150, 90, 0.14);
      --tag-bg: #29221e;
      --tag-text: #d4b08e;
      --imp1: #7a6e65;
      --imp2: #558aad;
      --imp3: #4e8a5e;
      --imp4: #c67e38;
      --imp5: #c05555;
      --filter-active-bg: #e8965a;
      --filter-active-text: #1a1210;
      --shadow: 0 2px 12px rgba(0,0,0,0.28), 0 8px 32px rgba(0,0,0,0.22);
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.2);
    }
  }
  :root[data-theme="dark"] {
    --bg: #13100e;
    --surface: rgba(30, 25, 22, 0.94);
    --surface-strong: #1e1915;
    --border: #342b26;
    --text: #f0e6da;
    --text-muted: #b09880;
    --accent: #e8965a;
    --accent-2: #d07a3e;
    --accent-soft: rgba(232, 150, 90, 0.14);
    --tag-bg: #29221e;
    --tag-text: #d4b08e;
    --imp1: #7a6e65;
    --imp2: #558aad;
    --imp3: #4e8a5e;
    --imp4: #c67e38;
    --imp5: #c05555;
    --filter-active-bg: #e8965a;
    --filter-active-text: #1a1210;
    --shadow: 0 2px 12px rgba(0,0,0,0.28), 0 8px 32px rgba(0,0,0,0.22);
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.2);
  }
  :root[data-theme="light"] {
    --bg: #f4efe7;
    --surface: rgba(255, 252, 247, 0.92);
    --surface-strong: #fffaf3;
    --border: #e5d8c7;
    --text: #2f2419;
    --text-muted: #7b6a57;
    --accent: #b85c38;
    --accent-2: #a04428;
    --accent-soft: rgba(184, 92, 56, 0.12);
    --tag-bg: #efe2d1;
    --tag-text: #6e513d;
    --imp1: #a89a8e;
    --imp2: #5d9fc4;
    --imp3: #5a9968;
    --imp4: #d4853a;
    --imp5: #c94f4f;
    --filter-active-bg: #b85c38;
    --filter-active-text: #fff;
    --shadow: 0 2px 12px rgba(78, 50, 22, 0.07), 0 8px 32px rgba(78, 50, 22, 0.05);
    --shadow-sm: 0 1px 4px rgba(78, 50, 22, 0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: light dark; scroll-behavior: smooth; }
  body {
    font-family: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 0% 0%, var(--accent-soft) 0%, transparent 55%),
      radial-gradient(ellipse at 100% 100%, var(--accent-soft) 0%, transparent 55%);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 12px 18px;
    position: sticky;
    top: 0;
    z-index: 200;
  }
  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }

  /* Brand */
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: inherit;
    flex-shrink: 0;
  }
  .brand:hover .brand-logo { transform: scale(1.06); }
  .brand-logo {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(145deg, var(--accent), var(--accent-2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 1.05rem;
    color: #fff;
    letter-spacing: -0.02em;
    flex-shrink: 0;
    transition: transform 0.2s ease;
    box-shadow: 0 2px 8px rgba(184,92,56,0.35);
    user-select: none;
  }
  .brand-text {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .site-title {
    font-size: 1.08rem;
    font-weight: 780;
    letter-spacing: -0.03em;
    line-height: 1.2;
  }
  .brand-byline {
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.01em;
    line-height: 1;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Icon Buttons */
  .icon-btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--surface-strong);
    color: var(--text);
    border-radius: 999px;
    width: 38px;
    height: 38px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.18s, transform 0.18s, background 0.18s, color 0.18s;
    flex-shrink: 0;
  }
  .icon-btn:hover { border-color: var(--accent); transform: translateY(-1px); }
  .icon-btn:active { transform: translateY(0); }
  .icon-btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--accent-soft);
    border-color: var(--accent);
  }
  .icon-btn[disabled] { opacity: 0.38; cursor: not-allowed; transform: none; }
  .icon-btn svg { pointer-events: none; }

  /* ── Main layout ── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 16px 32px;
  }

  /* ── Control Module ── */
  .module {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: clip;
  }

  /* Search bar — always visible at top of module */
  .search-bar-row {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .search-icon {
    color: var(--text-muted);
    flex-shrink: 0;
    pointer-events: none;
  }
  .search-input {
    appearance: none;
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 0.92rem;
    outline: none;
    font-family: inherit;
    min-width: 0;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-clear {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 0.9rem;
    line-height: 1;
    display: none;
  }
  .search-clear.visible { display: block; }
  .search-clear:hover { color: var(--text); }

  /* Date navigation row */
  .module-head {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* Segmented control */
  .seg {
    display: inline-flex;
    align-items: center;
    border: 1px solid var(--border);
    background: var(--surface-strong);
    border-radius: 999px;
    overflow: hidden;
  }
  .seg button {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--text-muted);
    padding: 7px 13px;
    font-size: 0.83rem;
    cursor: pointer;
    min-height: 36px;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .seg button:hover { color: var(--accent); }
  .seg button.active {
    background: var(--filter-active-bg);
    color: var(--filter-active-text);
    font-weight: 600;
  }
  .seg button:focus-visible {
    outline: none;
    box-shadow: inset 0 0 0 2px var(--accent);
  }

  .date-picker {
    appearance: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface-strong);
    color: var(--text);
    padding: 8px 10px;
    font-size: 0.88rem;
    min-height: 36px;
    outline: none;
    font-family: inherit;
    cursor: pointer;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .date-picker:focus-visible {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .range-pill {
    display: inline-flex;
    align-items: center;
    padding: 8px 12px;
    min-height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface-strong);
    color: var(--text-muted);
    font-size: 0.86rem;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  .count-badge {
    display: inline-flex;
    align-items: center;
    padding: 5px 11px;
    border-radius: 999px;
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 0.78rem;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Collapsible filters */
  details.filters > summary {
    list-style: none;
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    user-select: none;
    border-top: 1px solid var(--border);
    transition: background 0.15s;
  }
  details.filters > summary:hover { background: var(--accent-soft); }
  details.filters > summary:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  details.filters > summary::-webkit-details-marker { display: none; }
  .summary-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .summary-title {
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .summary-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 52ch;
  }
  .summary-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .chev {
    color: var(--text-muted);
    transition: transform 0.18s ease;
    display: flex;
    align-items: center;
  }
  details.filters[open] .chev { transform: rotate(180deg); }
  .active-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    display: none;
    flex-shrink: 0;
  }
  .active-dot.visible { display: block; }

  .filters-body {
    padding: 12px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 11px;
    border-top: 1px solid var(--border);
  }
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    min-width: 40px;
    flex-shrink: 0;
  }

  /* Chips */
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 5px 11px;
    border-radius: 999px;
    font-size: 0.8rem;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    color: var(--tag-text);
    transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.15s;
    user-select: none;
    min-height: 32px;
    font-family: inherit;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .chip:active { transform: translateY(0); }
  .chip.active {
    background: var(--filter-active-bg);
    color: var(--filter-active-text);
    border-color: var(--filter-active-bg);
    font-weight: 600;
  }

  .muted {
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  /* Sort select */
  .sort-select {
    appearance: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface-strong);
    color: var(--text);
    padding: 6px 10px;
    font-size: 0.86rem;
    min-height: 32px;
    outline: none;
    font-family: inherit;
    cursor: pointer;
    transition: border-color 0.18s;
    min-width: 148px;
  }
  .sort-select:focus-visible { border-color: var(--accent); }

  /* ── Items list ── */
  .items-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Day sections */
  .day-section { margin-top: 6px; }
  .day-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 14px;
    margin: 4px 0 8px;
  }
  .day-title {
    font-size: 0.96rem;
    font-weight: 780;
    letter-spacing: -0.01em;
  }
  .day-sub {
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  /* Card */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(7px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 15px 16px;
    display: flex;
    gap: 12px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.18s, border-color 0.18s, transform 0.18s;
    animation: fadeUp 0.28s ease both;
  }
  .card:hover {
    box-shadow: var(--shadow);
    border-color: color-mix(in srgb, var(--border) 60%, var(--accent) 40%);
    transform: translateY(-1px);
  }

  /* Importance color bar */
  .imp-bar {
    flex-shrink: 0;
    width: 4px;
    border-radius: 999px;
    background: var(--imp1);
    align-self: stretch;
    min-height: 40px;
  }
  .imp-bar.imp-1 { background: var(--imp1); }
  .imp-bar.imp-2 { background: var(--imp2); }
  .imp-bar.imp-3 { background: var(--imp3); }
  .imp-bar.imp-4 { background: var(--imp4); }
  .imp-bar.imp-5 { background: var(--imp5); }

  .card-body { flex: 1; min-width: 0; }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .card-title-wrap { flex: 1; min-width: 0; }
  .card-title {
    font-size: 0.98rem;
    font-weight: 700;
    line-height: 1.45;
    display: flex;
    align-items: baseline;
    gap: 7px;
    flex-wrap: wrap;
  }
  .card-title a {
    color: var(--text);
    text-decoration: none;
  }
  .card-title a:hover { color: var(--accent); }

  /* Importance numeric badge */
  .imp-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 5px;
    font-size: 0.68rem;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
    margin-top: 2px;
    letter-spacing: 0;
    line-height: 1;
  }
  .imp-num.imp-1 { background: var(--imp1); }
  .imp-num.imp-2 { background: var(--imp2); }
  .imp-num.imp-3 { background: var(--imp3); }
  .imp-num.imp-4 { background: var(--imp4); }
  .imp-num.imp-5 { background: var(--imp5); }

  .card-title-en {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 2px;
    line-height: 1.4;
  }

  .card-actions {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .card-btn {
    appearance: none;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    width: 30px;
    height: 30px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    flex-shrink: 0;
    font-family: inherit;
  }
  .card-btn svg { pointer-events: none; }
  .card-btn:hover {
    border-color: var(--border);
    background: var(--surface-strong);
    color: var(--text);
  }
  .card-btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--accent-soft);
    border-color: var(--accent);
  }
  .card-btn.hidden { display: none; }

  .card-summary {
    font-size: 0.9rem;
    color: var(--text-muted);
    line-height: 1.65;
    margin-bottom: 10px;
  }
  .card-summary.hidden { display: none; }

  .card-footer {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .tag {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 0.76rem;
    background: var(--tag-bg);
    color: var(--tag-text);
  }
  .card-source {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-left: auto;
    white-space: nowrap;
  }
  .card-source a { color: var(--text-muted); text-decoration: none; }
  .card-source a:hover { color: var(--accent); }
  .card-date {
    font-size: 0.76rem;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  /* Empty / loading */
  .empty-state {
    text-align: center;
    padding: 64px 20px;
    color: var(--text-muted);
  }
  .empty-state .empty-icon {
    font-size: 2.4rem;
    margin-bottom: 14px;
    display: block;
    opacity: 0.6;
  }
  .empty-state h2 { font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }
  .empty-state p { font-size: 0.9rem; line-height: 1.5; }

  .loading {
    text-align: center;
    padding: 48px;
    color: var(--text-muted);
    font-size: 0.9rem;
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-left: 6px;
    animation: pulse 1.2s ease-in-out infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50%       { opacity: 1;   transform: scale(1.2); }
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 88px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--text);
    color: var(--bg);
    padding: 9px 18px;
    border-radius: 999px;
    font-size: 0.86rem;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s, transform 0.22s;
    z-index: 999;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Back to top ── */
  .back-top {
    position: fixed;
    bottom: 28px;
    right: 20px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--surface-strong);
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
    transition: opacity 0.22s, transform 0.22s, border-color 0.18s, color 0.18s;
    z-index: 150;
    box-shadow: var(--shadow-sm);
  }
  .back-top.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }
  .back-top:hover { border-color: var(--accent); color: var(--accent); }
  .back-top svg { pointer-events: none; }

  /* ── Footer ── */
  footer {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 16px 40px;
    text-align: center;
  }
  .footer-links {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px 4px;
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .footer-links a {
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.15s;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .footer-links a:hover { color: var(--accent); }
  .footer-sep { opacity: 0.4; }
  .footer-copy {
    font-size: 0.76rem;
    color: var(--text-muted);
    opacity: 0.6;
  }

  /* ── Responsive ── */
  @media (max-width: 680px) {
    header { padding: 10px 14px; }
    main { padding: 14px 12px 28px; }
    .brand-byline { display: none; }
    .summary-meta { display: none; }
    .card { padding: 13px 14px; gap: 10px; }
    .date-picker { display: none; }
    .count-badge { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition: none !important;
      animation: none !important;
    }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="brand" href="https://kingcos.me" target="_blank" rel="noopener" title="前往 kingcos.me">
      <div class="brand-logo" aria-hidden="true">K</div>
      <div class="brand-text">
        <div class="site-title">AI 日报</div>

      </div>
    </a>

    <div class="header-actions">
      <button class="icon-btn" id="share-btn" type="button" title="分享此页" aria-label="分享此页">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>

  </div>
</header>

<main>
  <div class="module" id="module" style="display:none">
    <!-- Search bar — always visible -->
    <div class="search-bar-row">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" id="search-input" type="search" placeholder="搜索标题、摘要、标签、来源…" autocomplete="off" spellcheck="false">
      <button class="search-clear" id="search-clear" type="button" aria-label="清空搜索">✕</button>
    </div>

    <!-- Date navigation -->
    <div class="module-head" aria-label="日期切换">

        <button class="icon-btn" id="prev-day" title="前一天" aria-label="前一天" style="width:34px;height:34px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg>
        </button>

        <span class="seg" role="group" aria-label="快捷日期">
          <button id="quick-today" type="button" class="active">今日</button>
          <button id="quick-yesterday" type="button">昨日</button>
          <button id="quick-week" type="button">本周</button>
          <button id="quick-all" type="button">全部</button>
        </span>

        <button class="icon-btn" id="next-day" title="后一天" aria-label="后一天" style="width:34px;height:34px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polyline points="9,18 15,12 9,6"/></svg>

        <input class="date-picker" id="date-picker" type="date" aria-label="选择日期">

    <!-- Collapsible filters -->

<button class="back-top" id="back-top" title="回到顶部" aria-label="回到顶部">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polyline points="18,15 12,9 6,15"/></svg>
</button>

<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<footer>
  <div class="footer-links">
    <a href="https://kingcos.me" target="_blank" rel="noopener">kingcos.me</a>
    <span class="footer-sep">·</span>
    <a href="https://github.com/kingcos/ai-daily" target="_blank" rel="noopener">GitHub</a>
    <span class="footer-sep">·</span>
    <a href="./data/index.json" target="_blank" rel="noopener">JSON Feed</a>
  </div>
  <div class="footer-copy">AI 日报 · 精选 AI 行业每日动态 · 双语摘要</div>
</footer>

<script>
  const INDEX_URL = './data/index.json';
  const BEIJING_TZ = 'Asia/Shanghai';

  let indexMeta = null;
  let currentDate = null;
  let allItems = [];
  let viewMode = 'day';   // 'day' | 'week' | 'all'
  let sortMode = 'importance'; // 'importance' | 'time'
  let defaultLang = localStorage.getItem('ai-daily-lang') || 'zh'; // 'zh' | 'en'
  const dayCache = new Map();

  let activeFilters = { tag: null, source: null, search: '' };
  let toastTimer = null;

  /* ── Utilities ── */
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function formatDateTimeCN(iso) {
    if (!iso) return '';
    try {
      return new Intl.DateTimeFormat('zh-CN', {
        timeZone: BEIJING_TZ,
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', hour12: false
      }).format(new Date(iso));
    } catch { return String(iso); }
  }

  function formatHM(iso) {
    if (!iso) return '';
    try {
      return new Intl.DateTimeFormat('zh-CN', {
        timeZone: BEIJING_TZ, hour: '2-digit', minute: '2-digit', hour12: false
      }).format(new Date(iso));
    } catch { return ''; }
  }

  function impClass(n) {
    return 'imp-' + Math.max(1, Math.min(5, Math.round(n || 3)));
  }

  function buildSearchText(item) {
    return [item.title_zh, item.title_en, item.summary_zh, item.summary_en,
            item.source_name, (item.tags || []).join(' ')].join(' ').toLowerCase();
  }

  /* ── Toast ── */
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
  }

  /* ── Clipboard / Share ── */
  async function copyToClipboard(text) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch {}
      ta.remove();
      return true;
    }
  }

  async function shareCurrentPage() {
    const url = window.location.href;
    const title = 'AI 日报 · kingcos.me';
    const text = '精选 AI 行业每日动态，双语摘要。';
    if (navigator.share) {
      try { await navigator.share({ title, text, url }); return; } catch {}
    }
    await copyToClipboard(url);
    showToast('页面链接已复制 ✓');
  }

  function shareCard(btn) {
    const url = btn.dataset.url;
    if (!url) return;
    copyToClipboard(url).then(() => showToast('文章链接已复制 ✓'));
  }

  /* ── Language ── */
  function setDefaultLang(lang) {
    defaultLang = lang;
    localStorage.setItem('ai-daily-lang', lang);
    document.querySelectorAll('.card').forEach(card => {
      const summaries = card.querySelectorAll('.card-summary');
      if (summaries.length < 2) return;
      summaries.forEach(s => {
        const isZH = s.id.startsWith('zh-');
        s.classList.toggle('hidden', isZH ? lang !== 'zh' : lang !== 'en');
      });
    });
    document.getElementById('lang-zh')?.classList.toggle('active', lang === 'zh');
    document.getElementById('lang-en')?.classList.toggle('active', lang === 'en');
  }

  function toggleLang(id) {
    const zh = document.getElementById('zh-' + id);
    const en = document.getElementById('en-' + id);
    if (!zh || !en) return;
    const showingZH = !zh.classList.contains('hidden');
    zh.classList.toggle('hidden', showingZH);
    en.classList.toggle('hidden', !showingZH);
  }

  /* ── Render Card ── */
  function renderCard(item) {
    const hasBothLang = !!(item.summary_en && item.summary_zh);
    const titleMain = item.title_zh || item.title_en || '（无标题）';
    const titleSub = item.title_zh && item.title_en ? item.title_en : '';
    const summaryZH = item.summary_zh || '';
    const summaryEN = item.summary_en || '';
    const ic = impClass(item.importance);
    const impN = Math.max(1, Math.min(5, Math.round(item.importance || 3)));
    const tagsHtml = (item.tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
    const zhId = 'zh-' + item.id;
    const enId = 'en-' + item.id;
    const zhHidden = defaultLang === 'en' && hasBothLang ? ' hidden' : '';
    const enHidden = defaultLang === 'zh' || !hasBothLang ? ' hidden' : '';

    return `
<div class="card"
  data-tags="${escHtml((item.tags || []).join(','))}"
  data-source="${escHtml(item.source_name || '')}"
  data-search="${escHtml(buildSearchText(item))}">
  <div class="imp-bar ${ic}" aria-hidden="true"></div>
  <div class="card-body">
    <div class="card-head">
      <div class="card-title-wrap">
        <div class="card-title">
          <span class="imp-num ${ic}" title="重要性 ${impN}/5" aria-label="重要性 ${impN}">${impN}</span>
          <a href="${escHtml(item.source_url || '#')}" target="_blank" rel="noopener">${escHtml(titleMain)}</a>
        </div>
        ${titleSub ? `<div class="card-title-en">${escHtml(titleSub)}</div>` : ''}
      </div>
      <div class="card-actions">
        ${item.source_url ? `<button class="card-btn" data-url="${escHtml(item.source_url)}" onclick="shareCard(this)" title="复制文章链接" aria-label="复制文章链接">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
          </svg>
        </button>` : ''}
        ${hasBothLang ? `<button class="card-btn" title="切换中英文摘要" aria-label="切换中英文" onclick="toggleLang('${item.id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
          </svg>
        </button>` : ''}
      </div>
    </div>

    ${summaryZH ? `<div class="card-summary${zhHidden}" id="${zhId}">${escHtml(summaryZH)}</div>` : ''}
    ${summaryEN ? `<div class="card-summary${enHidden}" id="${enId}">${escHtml(summaryEN)}</div>` : ''}

    <div class="card-footer">
      ${tagsHtml}
      ${item.published_at ? `<span class="card-date">${formatHM(item.published_at)}</span>` : ''}
      <span class="card-source"><a href="${escHtml(item.source_url || '#')}" target="_blank" rel="noopener">${escHtml(item.source_name || '')}</a></span>
    </div>
  </div>
</div>`;
  }

  /* ── Filter dot indicator ── */
  function updateFilterDot() {
    const active = activeFilters.tag || activeFilters.source || activeFilters.search;
    document.getElementById('filter-dot')?.classList.toggle('visible', !!active);
    const meta = [];
    if (activeFilters.tag) meta.push(activeFilters.tag);
    if (activeFilters.source) meta.push(activeFilters.source);
    if (activeFilters.search) meta.push(`"${activeFilters.search}"`);
    const el = document.getElementById('filter-summary-meta');
    if (el) el.textContent = meta.length ? meta.join('、') : '';
  }

  /* ── Apply filters ── */
  function applyFilters() {
    const cards = document.querySelectorAll('.card');
    const keyword = activeFilters.search.trim().toLowerCase();
    let visibleCount = 0;

    cards.forEach(card => {
      const tags = (card.dataset.tags || '').split(',').filter(Boolean);
      const source = card.dataset.source || '';
      const searchable = card.dataset.search || '';
      const tagOk = !activeFilters.tag || tags.includes(activeFilters.tag);
      const srcOk = !activeFilters.source || source === activeFilters.source;
      const searchOk = !keyword || searchable.includes(keyword);
      const isVisible = tagOk && srcOk && searchOk;
      card.style.display = isVisible ? '' : 'none';
      if (isVisible) visibleCount += 1;
    });

    const emptyId = 'filter-empty-state';
    let emptyNode = document.getElementById(emptyId);
    if (!visibleCount) {
      if (!emptyNode) {
        emptyNode = document.createElement('div');
        emptyNode.id = emptyId;
        emptyNode.className = 'empty-state';
        emptyNode.innerHTML = '<span class="empty-icon">🔍</span><h2>没有匹配结果</h2><p>试试清空搜索词，或放宽标签/来源筛选。</p>';
        document.getElementById('content').appendChild(emptyNode);
      }
    } else if (emptyNode) {
      emptyNode.remove();
    }

    updateFilterDot();
  }

  /* ── Build filter chips ── */
  function buildFilters(items) {
    const tags = new Set();
    const sources = new Set();
    items.forEach(item => {
      (item.tags || []).forEach(t => tags.add(t));
      if (item.source_name) sources.add(item.source_name);
    });

    if (activeFilters.tag && !tags.has(activeFilters.tag)) activeFilters.tag = null;
    if (activeFilters.source && !sources.has(activeFilters.source)) activeFilters.source = null;

    function buildChipRow(rowId, filterKey, values, activeVal) {
      const row = document.getElementById(rowId);
      const label = row.querySelector('.label').outerHTML;
      row.innerHTML = label;

      const allChip = document.createElement('span');
      allChip.className = 'chip' + (!activeVal ? ' active' : '');
      allChip.dataset.filter = filterKey; allChip.dataset.value = 'all';
      allChip.textContent = '全部'; allChip.tabIndex = 0;
      row.appendChild(allChip);

      [...values].sort().forEach(v => {
        const c = document.createElement('span');
        c.className = 'chip' + (activeVal === v ? ' active' : '');
        c.dataset.filter = filterKey; c.dataset.value = v;
        c.textContent = v; c.tabIndex = 0;
        row.appendChild(c);
      });
    }

    buildChipRow('tag-filter-row', 'tag', tags, activeFilters.tag);
    buildChipRow('source-filter-row', 'source', sources, activeFilters.source);
    updateFilterDot();
  }

  /* ── Count badge ── */
  function updateCountBadge(count) {
    const el = document.getElementById('count-badge');
    if (!el) return;
    if (count !== null && count !== undefined) {
      el.textContent = `${count} 条`;
      el.style.display = '';
    } else {
      el.style.display = 'none';
    }
  }

  /* ── Date utilities ── */
  function dateToYMDInBeijing(d) {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: BEIJING_TZ, year: 'numeric', month: '2-digit', day: '2-digit'
    }).formatToParts(d);
    const get = t => parts.find(p => p.type === t)?.value;
    return `${get('year')}-${get('month')}-${get('day')}`;
  }

  function getTodayDate() { return dateToYMDInBeijing(new Date()); }

  function getYesterdayDate() {
    const y = new Date(); y.setDate(y.getDate() - 1);
    return dateToYMDInBeijing(y);
  }

  function getWeekDates(anchorDate) {
    const dates = indexMeta?.dates || [];
    if (!anchorDate) return [];
    const [y, m, d] = anchorDate.split('-').map(Number);
    const anchor = new Date(Date.UTC(y, m - 1, d));
    const diffToMonday = (anchor.getUTCDay() + 6) % 7;
    const monday = new Date(anchor);
    monday.setUTCDate(anchor.getUTCDate() - diffToMonday);
    const sunday = new Date(monday);
    sunday.setUTCDate(monday.getUTCDate() + 6);
    return dates.filter(dt => {
      const [yy, mm, dd] = dt.split('-').map(Number);
      const x = new Date(Date.UTC(yy, mm - 1, dd));
      return x >= monday && x <= sunday;
    });
  }

  /* ── Adjacent date navigation ── */
  function getAdjacentDate(direction) {
    const dates = indexMeta?.dates || [];
    if (!dates.length || viewMode !== 'day') return null;
    const idx = dates.indexOf(currentDate);
    if (idx < 0) return null;
    if (direction === 'prev') return idx < dates.length - 1 ? dates[idx + 1] : null;
    return idx > 0 ? dates[idx - 1] : null;
  }

  function updateNavArrows() {
    const prevBtn = document.getElementById('prev-day');
    const nextBtn = document.getElementById('next-day');
    if (!prevBtn || !nextBtn) return;
    const inDay = viewMode === 'day';
    prevBtn.style.visibility = inDay ? '' : 'hidden';
    nextBtn.style.visibility = inDay ? '' : 'hidden';
    if (inDay) {
      prevBtn.disabled = !getAdjacentDate('prev');
      nextBtn.disabled = !getAdjacentDate('next');
    }
  }

  /* ── Title / URL state ── */
  function setSubtitle(text) {
    document.title = text ? `AI 日报 · ${text}` : 'AI 日报 · kingcos.me';
  }

  function getUrlState() {
    const u = new URL(window.location.href);
    return { mode: u.searchParams.get('mode'), date: u.searchParams.get('date') };
  }

  function setUrlState(next) {
    const u = new URL(window.location.href);
    next.mode ? u.searchParams.set('mode', next.mode) : u.searchParams.delete('mode');
    next.date ? u.searchParams.set('date', next.date) : u.searchParams.delete('date');
    history.replaceState(null, '', u.toString());
  }

  /* ── Date picker sync ── */
  function syncDatePicker() {
    const dp = document.getElementById('date-picker');
    const range = document.getElementById('range-label');

    if (viewMode === 'day') {
      if (dp) { dp.style.display = ''; dp.value = currentDate || ''; }
      if (range) range.style.display = 'none';
      return;
    }
    if (dp) dp.style.display = 'none';
    if (!range) return;

    const dates = indexMeta?.dates || [];
    if (viewMode === 'all') {
      range.textContent = dates.length ? `${dates[dates.length - 1]} → ${dates[0]}` : '—';
    } else if (viewMode === 'week') {
      const wd = getWeekDates(getTodayDate());
      range.textContent = wd.length ? `${wd[wd.length - 1]} → ${wd[0]}` : '—';
    }
    range.style.display = '';
  }

  function setQuickActive(which) {
    ['quick-all', 'quick-today', 'quick-yesterday', 'quick-week'].forEach(id => {
      document.getElementById(id)?.classList.remove('active');
    });
    document.getElementById(which)?.classList.add('active');
  }

  /* ── Sort ── */
  function sortItems(items) {
    const arr = (items || []).slice();
    const getTime = x => x?.published_at ? new Date(x.published_at).getTime() : 0;
    if (sortMode === 'time') {
      return arr.sort((a, b) => {
        const d = getTime(b) - getTime(a);
        return d !== 0 ? d : (b.importance || 0) - (a.importance || 0);
      });
    }
    return arr.sort((a, b) => {
      const d = (b.importance || 0) - (a.importance || 0);
      return d !== 0 ? d : getTime(b) - getTime(a);
    });
  }

  /* ── Fetch ── */
  async function fetchDaily(date) {
    if (dayCache.has(date)) return dayCache.get(date);
    const res = await fetch(`./data/${date}.json`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    dayCache.set(date, data);
    return data;
  }

  /* ── Render: day view ── */
  function renderNoDataForDate(date) {
    viewMode = 'day'; currentDate = date;
    document.getElementById('module').style.display = '';
    syncDatePicker(); updateNavArrows(); buildFilters([]);
    updateCountBadge(0);
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">📭</span>
        <h2>暂无新闻数据</h2>
        <p>${escHtml(date)} 暂无数据。</p>
      </div>`;
    setSubtitle(date);
  }

  function renderDay(daily) {
    viewMode = 'day';
    currentDate = daily?.date || currentDate;
    allItems = sortItems(daily?.items || []);
    updateCountBadge(allItems.length);

    const updated = indexMeta?.updated_at ? `更新：${formatDateTimeCN(indexMeta.updated_at)}（北京）` : '';
    document.getElementById('updated-at').textContent = updated || '—';
    document.getElementById('module').style.display = '';
    syncDatePicker(); updateNavArrows(); buildFilters(allItems);
    setSubtitle(currentDate || '');

    const content = document.getElementById('content');
    if (!allItems.length) {
      content.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">📭</span>
          <h2>暂无新闻数据</h2>
          <p>${escHtml(currentDate)} 暂无数据。</p>
        </div>`;
      return;
    }
    content.innerHTML = `<div class="items-list">${allItems.map(renderCard).join('')}</div>`;
    applyFilters();
  }

  /* ── Render: multi-day sections ── */
  function renderSections(sectionDates, byDateItems) {
    const sections = sectionDates.map(d => ({ date: d, items: sortItems(byDateItems.get(d) || []) }));
    const flat = [];
    sections.forEach(s => flat.push(...s.items));
    allItems = flat;
    updateCountBadge(flat.length);

    const updated = indexMeta?.updated_at ? `更新：${formatDateTimeCN(indexMeta.updated_at)}（北京）` : '';
    document.getElementById('updated-at').textContent = updated || '—';
    document.getElementById('module').style.display = '';
    syncDatePicker(); updateNavArrows(); buildFilters(flat);
    setSubtitle(viewMode === 'week' ? '本周' : '全部');

    const html = sections.map(s => `
      <section class="day-section">
        <div class="day-header">
          <div class="day-title">${escHtml(s.date)}</div>
          <div class="day-sub">${s.items.length ? `${s.items.length} 条` : '暂无数据'}</div>
        </div>
        <div class="items-list">${s.items.map(renderCard).join('')}</div>
      </section>`).join('');

    document.getElementById('content').innerHTML = html || `
      <div class="empty-state">
        <span class="empty-icon">📭</span>
        <h2>暂无新闻数据</h2>
        <p>当前范围暂无数据。</p>
      </div>`;
    applyFilters();
  }

  /* ── Navigation actions ── */
  async function switchToDate(date) {
    viewMode = 'day'; currentDate = date;
    syncDatePicker(); updateNavArrows();
    setUrlState({ mode: 'day', date });

    const dates = new Set(indexMeta?.dates || []);
    if (!dates.has(date)) { renderNoDataForDate(date); return; }

    try {
      renderDay(await fetchDaily(date));
    } catch (err) {
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">⚠️</span>
          <h2>数据加载失败</h2>
          <p>${escHtml(date)} 加载失败，请稍后重试。</p>
          <p style="margin-top:8px;font-size:0.82rem;opacity:0.6">${escHtml(err.message)}</p>
        </div>`;
    }
  }

  async function showAll() {
    viewMode = 'all'; currentDate = getTodayDate();
    syncDatePicker(); updateNavArrows();
    setUrlState({ mode: 'all', date: null });

    const dates = indexMeta?.dates || [];
    const byDateItems = new Map();
    await Promise.all(dates.map(async d => {
      try { byDateItems.set(d, (await fetchDaily(d))?.items || []); }
      catch { byDateItems.set(d, []); }
    }));
    renderSections(dates, byDateItems);
  }

  async function showWeek() {
    viewMode = 'week'; currentDate = getTodayDate();
    syncDatePicker(); updateNavArrows();
    setUrlState({ mode: 'week', date: null });

    const weekDates = getWeekDates(getTodayDate());
    const byDateItems = new Map();
    await Promise.all(weekDates.map(async d => {
      try { byDateItems.set(d, (await fetchDaily(d))?.items || []); }
      catch { byDateItems.set(d, []); }
    }));
    renderSections(weekDates, byDateItems);
  }

  /* ── Init: Date nav ── */
  function initDateNav() {
    const dp = document.getElementById('date-picker');
    const dates = indexMeta?.dates || [];
    if (dates.length) {
      dp.min = dates[dates.length - 1];
      dp.max = dates[0];
    }

    document.getElementById('quick-today').addEventListener('click', async () => {
      setQuickActive('quick-today');
      await switchToDate(getTodayDate());
    });
    document.getElementById('quick-yesterday').addEventListener('click', async () => {
      setQuickActive('quick-yesterday');
      await switchToDate(getYesterdayDate());
    });
    document.getElementById('quick-week').addEventListener('click', async () => {
      setQuickActive('quick-week');
      await showWeek();
    });
    document.getElementById('quick-all').addEventListener('click', async () => {
      setQuickActive('quick-all');
      await showAll();
    });

    dp.addEventListener('change', async () => {
      if (!dp.value) return;
      setQuickActive('quick-all');
      await switchToDate(dp.value);
    });

    document.getElementById('prev-day').addEventListener('click', async () => {
      const prev = getAdjacentDate('prev');
      if (prev) { setQuickActive('quick-all'); await switchToDate(prev); }
    });
    document.getElementById('next-day').addEventListener('click', async () => {
      const next = getAdjacentDate('next');
      if (next) { setQuickActive('quick-all'); await switchToDate(next); }
    });
  }

  /* ── Init: Search ── */
  function initSearch() {
    const input = document.getElementById('search-input');
    const clear = document.getElementById('search-clear');

    input.addEventListener('input', () => {
      activeFilters.search = input.value;
      clear.classList.toggle('visible', !!input.value);
      applyFilters();
    });

    clear.addEventListener('click', () => {
      input.value = '';
      activeFilters.search = '';
      clear.classList.remove('visible');
      input.focus();
      applyFilters();
    });
  }

  /* ── Init: Sort ── */
  function initSort() {
    const sel = document.getElementById('sort-select');
    if (!sel) return;
    sel.addEventListener('change', async () => {
      sortMode = sel.value === 'time' ? 'time' : 'importance';
      if (viewMode === 'all') { await showAll(); return; }
      if (viewMode === 'week') { await showWeek(); return; }
      await switchToDate(currentDate || getTodayDate());
    });
  }

  /* ── Init: Language toggle ── */
  function initLangToggle() {
    document.getElementById('lang-zh').addEventListener('click', () => setDefaultLang('zh'));
    document.getElementById('lang-en').addEventListener('click', () => setDefaultLang('en'));
    // Sync button state from saved preference
    document.getElementById('lang-zh')?.classList.toggle('active', defaultLang === 'zh');
    document.getElementById('lang-en')?.classList.toggle('active', defaultLang === 'en');
  }

  /* ── Init: Chip filters ── */
  function initChipFilters() {
    document.getElementById('filters').addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      const filterType = chip.dataset.filter;
      const value = chip.dataset.value;
      document.querySelectorAll(`.chip[data-filter="${filterType}"]`).forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (filterType === 'tag') activeFilters.tag = value === 'all' ? null : value;
      if (filterType === 'source') activeFilters.source = value === 'all' ? null : value;
      applyFilters();
    });
    // Keyboard support for chips
    document.getElementById('filters').addEventListener('keydown', e => {
      if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('chip')) {
        e.preventDefault(); e.target.click();
      }
    });
  }

  /* ── Init: Theme ── */
  function initThemeToggle() {
    const btn = document.getElementById('theme-toggle');
    const getCurrentTheme = () => {
      if (document.documentElement.dataset.theme === 'dark') return 'dark';
      if (document.documentElement.dataset.theme === 'light') return 'light';
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    };
    const sync = () => { btn.textContent = getCurrentTheme() === 'dark' ? '☀️' : '🌙'; };
    btn.addEventListener('click', () => {
      const next = getCurrentTheme() === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('ai-daily-theme', next);
      sync();
    });
    sync();
  }

  /* ── Init: Share button ── */
  function initShareBtn() {
    document.getElementById('share-btn')?.addEventListener('click', shareCurrentPage);
  }

  /* ── Init: Back to top ── */
  function initBackTop() {
    const btn = document.getElementById('back-top');
    window.addEventListener('scroll', () => {
      btn.classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
    btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  }

  /* ── Main load ── */
  async function load() {
    try {
      initThemeToggle();
      initSearch();
      initSort();
      initLangToggle();
      initChipFilters();
      initShareBtn();
      initBackTop();

      const res = await fetch(INDEX_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      indexMeta = await res.json();

      const { mode, date } = getUrlState();
      initDateNav();

      if (mode === 'all') {
        setQuickActive('quick-all');
        await showAll();
        setUrlState({ mode: 'all', date: null });
        return;
      }
      if (mode === 'week') {
        setQuickActive('quick-week');
        await showWeek();
        setUrlState({ mode: 'week', date: null });
        return;
      }

      // Default: today in Beijing. If URL has a date, honor it.
      // If today has no data, fall back to latest available date.
      const todayDate = getTodayDate();
      const availDates = new Set(indexMeta?.dates || []);
      let target = date || (availDates.has(todayDate) ? todayDate : (indexMeta?.dates?.[0] || todayDate));
      const quickId = (target === todayDate && !date) ? 'quick-today' : 'quick-all';
      setQuickActive(quickId);
      await switchToDate(target);
      setUrlState({ mode: 'day', date: target });

    } catch (err) {
      setSubtitle('加载失败');
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">⚠️</span>
          <h2>数据加载失败</h2>
          <p>请确认已通过 GitHub Pages 访问本页面，且数据文件已生成。</p>
          <p style="margin-top:8px;font-size:0.82rem;opacity:0.6">${escHtml(err.message)}</p>
        </div>`;
    }
  }

  load();
</script>
</body>
</html>
