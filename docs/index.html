<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 日报</title>
<script>
  (() => {
    const savedTheme = localStorage.getItem('ai-daily-theme');
    if (savedTheme === 'dark' || savedTheme === 'light') {
      document.documentElement.dataset.theme = savedTheme;
    }
  })();
</script>
<style>
  :root {
    --bg: #f4efe7;
    --surface: rgba(255, 252, 247, 0.9);
    --surface-strong: #fffaf3;
    --border: #e5d8c7;
    --text: #2f2419;
    --text-muted: #7b6a57;
    --accent: #b85c38;
    --accent-soft: rgba(184, 92, 56, 0.12);
    --tag-bg: #efe2d1;
    --tag-text: #6e513d;
    --imp1: #b1a79a;
    --imp2: #6ea8c8;
    --imp3: #6a9a72;
    --imp4: #d8893a;
    --imp5: #d15a5a;
    --filter-active-bg: #b85c38;
    --filter-active-text: #fff;
    --shadow: 0 16px 40px rgba(78, 50, 22, 0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #14110f;
      --surface: rgba(33, 27, 24, 0.92);
      --surface-strong: #201916;
      --border: #3a2f2a;
      --text: #f7efe5;
      --text-muted: #bea68e;
      --accent: #f2a65a;
      --accent-soft: rgba(242, 166, 90, 0.14);
      --tag-bg: #2d2521;
      --tag-text: #dfc2a3;
      --imp1: #82776b;
      --imp2: #5e92b2;
      --imp3: #5a8f65;
      --imp4: #d08a3f;
      --imp5: #d96b6b;
      --filter-active-bg: #f2a65a;
      --filter-active-text: #1c1612;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
    }
  }
  :root[data-theme="dark"] {
    --bg: #14110f;
    --surface: rgba(33, 27, 24, 0.92);
    --surface-strong: #201916;
    --border: #3a2f2a;
    --text: #f7efe5;
    --text-muted: #bea68e;
    --accent: #f2a65a;
    --accent-soft: rgba(242, 166, 90, 0.14);
    --tag-bg: #2d2521;
    --tag-text: #dfc2a3;
    --imp1: #82776b;
    --imp2: #5e92b2;
    --imp3: #5a8f65;
    --imp4: #d08a3f;
    --imp5: #d96b6b;
    --filter-active-bg: #f2a65a;
    --filter-active-text: #1c1612;
    --shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at top left, var(--accent-soft), transparent 32%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 30%);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .site-title {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .site-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .theme-toggle {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--surface-strong);
    color: var(--text);
    border-radius: 999px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 0.78rem;
    transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.2s;
  }
  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  .filter-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: var(--shadow);
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    min-width: 36px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.78rem;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    color: var(--tag-text);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active {
    background: var(--filter-active-bg);
    color: var(--filter-active-text);
    border-color: var(--filter-active-bg);
  }
  .search-input,
  .date-select {
    appearance: none;
    width: min(100%, 320px);
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface-strong);
    color: var(--text);
    padding: 10px 12px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus,
  .date-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .helper-text {
    font-size: 0.76rem;
    color: var(--text-muted);
  }
  .items-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    gap: 14px;
    box-shadow: var(--shadow);
  }
  .imp-badge {
    flex-shrink: 0;
    width: 6px;
    border-radius: 3px;
    background: var(--imp1);
  }
  .imp-1 { background: var(--imp1); }
  .imp-2 { background: var(--imp2); }
  .imp-3 { background: var(--imp3); }
  .imp-4 { background: var(--imp4); }
  .imp-5 { background: var(--imp5); }
  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .card-title a {
    color: var(--text);
    text-decoration: none;
  }
  .card-title a:hover { color: var(--accent); }
  .card-title-en {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .card-summary {
    font-size: 0.875rem;
    color: var(--text-muted);
    line-height: 1.55;
    margin-bottom: 10px;
  }
  .card-summary.hidden { display: none; }
  .toggle-lang {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.72rem;
    color: var(--text-muted);
    cursor: pointer;
    margin-bottom: 8px;
    display: inline-block;
  }
  .toggle-lang:hover { color: var(--accent); border-color: var(--accent); }
  .toggle-lang.hidden { display: none; }
  .card-footer {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.72rem;
    background: var(--tag-bg);
    color: var(--tag-text);
  }
  .card-source {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-left: auto;
    white-space: nowrap;
  }
  .card-source a { color: var(--text-muted); text-decoration: none; }
  .card-source a:hover { color: var(--accent); }
  .card-date {
    font-size: 0.72rem;
    color: var(--text-muted);
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; }
  .empty-state p { font-size: 0.9rem; }
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 0.9rem;
  }
  footer {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 16px 32px;
    color: var(--text-muted);
    font-size: 0.82rem;
    text-align: center;
  }
  footer a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }
  footer a:hover {
    color: var(--accent);
    border-color: currentColor;
  }
  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .card { padding: 14px; }
    .filter-bar { padding: 12px; }
    .search-input,
    .date-select { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="site-title">AI 日报</div>
      <div class="site-meta" id="site-meta">加载中...</div>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="切换暗黑模式">暗黑模式</button>
    </div>
  </div>
</header>

<main>
  <div class="filter-bar" id="filter-bar" style="display:none">
    <div class="filter-row">
      <span class="filter-label">日期</span>
      <select class="date-select" id="date-select" aria-label="选择日报日期"></select>
      <span class="helper-text">按北京时间 08:00 切分</span>
    </div>
    <div class="filter-row">
      <span class="filter-label">搜索</span>
      <input class="search-input" id="search-input" type="search" placeholder="搜索标题、摘要、标签、来源">
    </div>
    <div class="filter-row">
      <span class="filter-label">语言</span>
      <span class="chip active" data-filter="lang" data-value="all">全部</span>
      <span class="chip" data-filter="lang" data-value="en">EN</span>
      <span class="chip" data-filter="lang" data-value="zh">中文</span>
    </div>
    <div class="filter-row" id="tag-filter-row">
      <span class="filter-label">标签</span>
    </div>
    <div class="filter-row" id="source-filter-row">
      <span class="filter-label">来源</span>
    </div>
  </div>

  <div id="content">
    <div class="loading">正在加载数据...</div>
  </div>
</main>

<footer>
  Powered by <a href="https://kingcos.me" target="_blank" rel="noopener">kingcos.me</a> with ❤️
</footer>

<script>
  const INDEX_URL = './data/index.json';
  const BEIJING_TZ = 'Asia/Shanghai';
  let indexMeta = null;
  let currentDate = null;
  let allItems = [];
  let activeFilters = { lang: 'all', tag: null, source: null, search: '' };

  function formatDate(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return new Intl.DateTimeFormat('zh-CN', {
        timeZone: BEIJING_TZ,
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).format(d);
    } catch { return iso; }
  }

  function formatUpdated(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      return '更新于 ' + new Intl.DateTimeFormat('zh-CN', {
        timeZone: BEIJING_TZ,
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).format(d) + '（北京时间）';
    } catch { return ''; }
  }

  function impClass(n) {
    return 'imp-' + Math.max(1, Math.min(5, Math.round(n)));
  }

  function impLabel(n) {
    const labels = ['', '低', '一般', '中', '重要', '重大'];
    return labels[Math.max(1, Math.min(5, Math.round(n)))] || '';
  }

  function renderCard(item) {
    const hasBothLang = item.summary_en && item.summary_zh;
    const titleMain = item.title_zh || item.title_en || '（无标题）';
    const titleSub = item.title_zh && item.title_en ? item.title_en : '';
    const summaryZH = item.summary_zh || '';
    const summaryEN = item.summary_en || '';

    const tagsHtml = (item.tags || []).map(t =>
      `<span class="tag">${escHtml(t)}</span>`
    ).join('');

    const toggleId = 'toggle-' + item.id;
    const zhId = 'zh-' + item.id;
    const enId = 'en-' + item.id;

    return `
<div class="card" data-lang="${item.lang || 'en'}"
     data-tags="${(item.tags || []).join(',')}"
     data-source="${escHtml(item.source_name || '')}"
     data-search="${escHtml([
       titleMain,
       titleSub,
       summaryZH,
       summaryEN,
       item.source_name || '',
       (item.tags || []).join(' ')
     ].join(' ').toLowerCase())}">
  <div class="imp-badge ${impClass(item.importance)}" title="重要性 ${item.importance}/5 · ${impLabel(item.importance)}"></div>
  <div class="card-body">
    <div class="card-title">
      <a href="${escHtml(item.source_url || '#')}" target="_blank" rel="noopener">${escHtml(titleMain)}</a>
    </div>
    ${titleSub ? `<div class="card-title-en">${escHtml(titleSub)}</div>` : ''}
    ${hasBothLang ? `<button class="toggle-lang" id="${toggleId}" onclick="toggleLang('${item.id}')">切换 EN/中</button>` : ''}
    ${summaryZH ? `<div class="card-summary" id="${zhId}">${escHtml(summaryZH)}</div>` : ''}
    ${summaryEN ? `<div class="card-summary hidden" id="${enId}">${escHtml(summaryEN)}</div>` : ''}
    <div class="card-footer">
      ${tagsHtml}
      <span class="card-date">${formatDate(item.published_at)}</span>
      <span class="card-source">
        <a href="${escHtml(item.source_url || '#')}" target="_blank" rel="noopener">${escHtml(item.source_name || '')}</a>
      </span>
    </div>
  </div>
</div>`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function toggleLang(id) {
    const zh = document.getElementById('zh-' + id);
    const en = document.getElementById('en-' + id);
    if (!zh || !en) return;
    const showingZH = !zh.classList.contains('hidden');
    zh.classList.toggle('hidden', showingZH);
    en.classList.toggle('hidden', !showingZH);
  }

  function applyFilters() {
    const cards = document.querySelectorAll('.card');
    const keyword = activeFilters.search.trim().toLowerCase();
    let visibleCount = 0;
    cards.forEach(card => {
      const lang = card.dataset.lang;
      const tags = card.dataset.tags.split(',');
      const source = card.dataset.source;
      const searchable = card.dataset.search || '';

      const langOk = activeFilters.lang === 'all' || lang === activeFilters.lang;
      const tagOk = !activeFilters.tag || tags.includes(activeFilters.tag);
      const srcOk = !activeFilters.source || source === activeFilters.source;
      const searchOk = !keyword || searchable.includes(keyword);

      const isVisible = langOk && tagOk && srcOk && searchOk;
      card.style.display = isVisible ? '' : 'none';
      if (isVisible) visibleCount += 1;
    });

    const emptyId = 'filter-empty-state';
    let emptyNode = document.getElementById(emptyId);
    if (!visibleCount) {
      if (!emptyNode) {
        emptyNode = document.createElement('div');
        emptyNode.id = emptyId;
        emptyNode.className = 'empty-state';
        emptyNode.innerHTML = '<h2>没有匹配结果</h2><p>试试切换日期、清空搜索词，或放宽标签和来源筛选。</p>';
        document.getElementById('content').appendChild(emptyNode);
      }
    } else if (emptyNode) {
      emptyNode.remove();
    }
  }

  function buildFilters(items) {
    const tags = new Set();
    const sources = new Set();
    items.forEach(item => {
      (item.tags || []).forEach(t => tags.add(t));
      if (item.source_name) sources.add(item.source_name);
    });

    if (activeFilters.tag && !tags.has(activeFilters.tag)) activeFilters.tag = null;
    if (activeFilters.source && !sources.has(activeFilters.source)) activeFilters.source = null;

    const tagRow = document.getElementById('tag-filter-row');
    const srcRow = document.getElementById('source-filter-row');
    tagRow.innerHTML = '<span class="filter-label">标签</span>';
    srcRow.innerHTML = '<span class="filter-label">来源</span>';

    // All-tags chip
    const allTagChip = document.createElement('span');
    allTagChip.className = 'chip' + (!activeFilters.tag ? ' active' : '');
    allTagChip.dataset.filter = 'tag';
    allTagChip.dataset.value = 'all';
    allTagChip.textContent = '全部';
    tagRow.appendChild(allTagChip);

    [...tags].sort().forEach(t => {
      const c = document.createElement('span');
      c.className = 'chip' + (activeFilters.tag === t ? ' active' : '');
      c.dataset.filter = 'tag';
      c.dataset.value = t;
      c.textContent = t;
      tagRow.appendChild(c);
    });

    // All-sources chip
    const allSrcChip = document.createElement('span');
    allSrcChip.className = 'chip' + (!activeFilters.source ? ' active' : '');
    allSrcChip.dataset.filter = 'source';
    allSrcChip.dataset.value = 'all';
    allSrcChip.textContent = '全部';
    srcRow.appendChild(allSrcChip);

    [...sources].sort().forEach(s => {
      const c = document.createElement('span');
      c.className = 'chip' + (activeFilters.source === s ? ' active' : '');
      c.dataset.filter = 'source';
      c.dataset.value = s;
      c.textContent = s;
      srcRow.appendChild(c);
    });
  }

  function buildDateOptions() {
    const select = document.getElementById('date-select');
    if (!indexMeta) return;
    select.innerHTML = (indexMeta.dates || []).map(date => (
      `<option value="${escHtml(date)}">${escHtml(date)}</option>`
    )).join('');
    if (currentDate) select.value = currentDate;
  }

  function updateMeta(date, itemCount) {
    document.getElementById('site-meta').textContent =
      date
        ? `${date} · ${itemCount} 条 · 按北京时间 08:00 切分 · ${formatUpdated(indexMeta?.updated_at)}`
        : '暂无数据';
  }

  function render(data) {
    const items = (data.items || []).slice().sort((a, b) => {
      const ia = a.importance || 0, ib = b.importance || 0;
      if (ib !== ia) return ib - ia;
      const da = a.published_at ? new Date(a.published_at) : 0;
      const db = b.published_at ? new Date(b.published_at) : 0;
      return db - da;
    });

    currentDate = data.date || currentDate;
    allItems = items;

    const content = document.getElementById('content');
    updateMeta(currentDate, items.length);
    document.getElementById('filter-bar').style.display = '';
    buildDateOptions();
    buildFilters(items);

    if (!items.length) {
      content.innerHTML = `
        <div class="empty-state">
          <h2>暂无新闻数据</h2>
          <p>运行 AI 日报流水线以生成第一期数据。</p>
        </div>`;
      return;
    }

    content.innerHTML = `<div class="items-list">${items.map(renderCard).join('')}</div>`;
    applyFilters();
  }

  function initThemeToggle() {
    const button = document.getElementById('theme-toggle');
    const syncLabel = () => {
      const isDark = document.documentElement.dataset.theme === 'dark' ||
        (!document.documentElement.dataset.theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
      button.textContent = isDark ? '浅色模式' : '暗黑模式';
    };

    button.addEventListener('click', () => {
      const current = document.documentElement.dataset.theme === 'dark' ? 'dark'
        : document.documentElement.dataset.theme === 'light' ? 'light'
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('ai-daily-theme', next);
      syncLabel();
    });

    syncLabel();
  }

  function initSearch() {
    const input = document.getElementById('search-input');
    input.addEventListener('input', () => {
      activeFilters.search = input.value;
      applyFilters();
    });
  }

  function initChipFilters() {
    document.getElementById('filter-bar').addEventListener('click', (event) => {
      const chip = event.target.closest('.chip');
      if (!chip) return;

      const filterType = chip.dataset.filter;
      const value = chip.dataset.value;

      document.querySelectorAll(`.chip[data-filter="${filterType}"]`).forEach(c => c.classList.remove('active'));
      chip.classList.add('active');

      if (filterType === 'lang') activeFilters.lang = value === 'all' ? 'all' : value;
      if (filterType === 'tag') activeFilters.tag = value === 'all' ? null : value;
      if (filterType === 'source') activeFilters.source = value === 'all' ? null : value;

      applyFilters();
    });
  }

  async function loadDate(date) {
    const res = await fetch(`./data/${date}.json`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    render(data);
  }

  function initDateFilter() {
    document.getElementById('date-select').addEventListener('change', async (event) => {
      const previousDate = currentDate;
      currentDate = event.target.value;
      try {
        await loadDate(currentDate);
      } catch (err) {
        currentDate = previousDate;
        event.target.value = previousDate;
        document.getElementById('site-meta').textContent = '日期加载失败';
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <h2>日期数据加载失败</h2>
            <p>请选择其他日期，或确认对应的日报 JSON 已生成。</p>
            <p style="margin-top:8px;font-size:0.8rem;opacity:0.6">${err.message}</p>
          </div>`;
      }
    });
  }

  async function load() {
    try {
      initThemeToggle();
      initSearch();
      initChipFilters();
      initDateFilter();

      const res = await fetch(INDEX_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      indexMeta = await res.json();
      currentDate = indexMeta.latest_date;

      if (!currentDate) {
        render({ date: null, items: [] });
        return;
      }

      await loadDate(currentDate);
    } catch (err) {
      document.getElementById('site-meta').textContent = '加载失败';
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <h2>数据加载失败</h2>
          <p>请确认 data/index.json 已生成，或通过 GitHub Pages 访问本页面。</p>
          <p style="margin-top:8px;font-size:0.8rem;opacity:0.6">${err.message}</p>
        </div>`;
    }
  }

  load();
</script>
</body>
</html>
