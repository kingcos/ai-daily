<style>
  :root {
    --bg:#f2ede5; --surface:rgba(255,253,249,.96); --surface-s:#fdfaf5;
    --hover:rgba(184,92,56,.04); --border:#e0d3c1; --border-s:#cabba5;
    --text:#28200f; --text-2:#5a4a38; --text-m:#8c7a66;
    --accent:#b85c38; --accent-d:#9c4828; --accent-s:rgba(184,92,56,.10);
    --tag-bg:#ece0cf; --tag-c:#6b4f38;
    --imp4:#cc7e30; --imp5:#c24444;
    --active-bg:#b85c38; --active-c:#fff;
    --shadow-xs:0 1px 3px rgba(50,30,10,.05);
    --shadow-sm:0 2px 10px rgba(50,30,10,.08);
    --shadow-md:0 6px 24px rgba(50,30,10,.12);
    --r:14px; --r-s:10px;
  }
  @media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
    --bg:#110e09; --surface:rgba(26,21,16,.97); --surface-s:#1a1510;
    --hover:rgba(232,150,90,.06); --border:#2a221a; --border-s:#3a3028;
    --text:#ebe0d2; --text-2:#c0a888; --text-m:#8e7860;
    --accent:#e8965a; --accent-d:#d07a3e; --accent-s:rgba(232,150,90,.12);
    --tag-bg:#221c16; --tag-c:#c8a882;
    --imp4:#c07430; --imp5:#bb4040;
    --active-bg:#e8965a; --active-c:#181008;
    --shadow-xs:0 1px 3px rgba(0,0,0,.3);
    --shadow-sm:0 2px 10px rgba(0,0,0,.35);
    --shadow-md:0 6px 24px rgba(0,0,0,.4);
  }}
  :root[data-theme="dark"] {
    --bg:#110e09; --surface:rgba(26,21,16,.97); --surface-s:#1a1510;
    --hover:rgba(232,150,90,.06); --border:#2a221a; --border-s:#3a3028;
    --text:#ebe0d2; --text-2:#c0a888; --text-m:#8e7860;
    --accent:#e8965a; --accent-d:#d07a3e; --accent-s:rgba(232,150,90,.12);
    --tag-bg:#221c16; --tag-c:#c8a882;
    --imp4:#c07430; --imp5:#bb4040;
    --active-bg:#e8965a; --active-c:#181008;
    --shadow-xs:0 1px 3px rgba(0,0,0,.3);
    --shadow-sm:0 2px 10px rgba(0,0,0,.35);
    --shadow-md:0 6px 24px rgba(0,0,0,.4);
  }
  :root[data-theme="light"] {
    --bg:#f2ede5; --surface:rgba(255,253,249,.96); --surface-s:#fdfaf5;
    --hover:rgba(184,92,56,.04); --border:#e0d3c1; --border-s:#cabba5;
    --text:#28200f; --text-2:#5a4a38; --text-m:#8c7a66;
    --accent:#b85c38; --accent-d:#9c4828; --accent-s:rgba(184,92,56,.10);
    --tag-bg:#ece0cf; --tag-c:#6b4f38;
    --imp4:#cc7e30; --imp5:#c24444;
    --active-bg:#b85c38; --active-c:#fff;
    --shadow-xs:0 1px 3px rgba(50,30,10,.05);
    --shadow-sm:0 2px 10px rgba(50,30,10,.08);
    --shadow-md:0 6px 24px rgba(50,30,10,.12);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{color-scheme:light dark;scroll-behavior:smooth}
  body{
    font-family:'SF Pro Display','PingFang SC','Noto Sans SC',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    background-image:radial-gradient(ellipse 80% 50% at 0 0,var(--accent-s),transparent),
      radial-gradient(ellipse 60% 40% at 100% 100%,rgba(184,92,56,.04),transparent);
    background-attachment:fixed;color:var(--text);line-height:1.65;min-height:100vh;
  }

  /* ── Header ── */
  header{background:var(--surface);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1px solid var(--border);height:54px;position:sticky;top:0;z-index:200;display:flex;align-items:center;padding:0 20px}
  .h-inner{max-width:720px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:9px;text-decoration:none;color:inherit;flex-shrink:0}
  .brand-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(140deg,var(--accent),var(--accent-d));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.95rem;color:#fff;box-shadow:0 2px 8px rgba(184,92,56,.35);transition:transform .2s;user-select:none;flex-shrink:0}
  .brand:hover .brand-logo{transform:scale(1.08)}
  .site-title{font-size:1rem;font-weight:780;letter-spacing:-.03em;line-height:1.2}
  .brand-sub{font-size:.64rem;color:var(--text-m);letter-spacing:.01em}
  .h-actions{display:flex;align-items:center;gap:6px}
  .ib{appearance:none;border:1px solid var(--border);background:var(--surface-s);color:var(--text);border-radius:999px;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:.85rem;transition:border-color .18s,transform .18s,color .18s}
  .ib:hover{border-color:var(--accent);transform:translateY(-1px)}.ib:active{transform:none}
  .ib:focus-visible{outline:none;box-shadow:0 0 0 3px var(--accent-s);border-color:var(--accent)}
  .ib svg{pointer-events:none}

  main{max-width:720px;margin:0 auto;padding:24px 16px 40px}

  /* ── Hero module ── */
  .hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm);margin-bottom:18px;overflow:clip}
  .search-row{display:flex;align-items:center;gap:9px;padding:10px 16px;border-bottom:1px solid var(--border)}
  .search-row svg{color:var(--text-m);flex-shrink:0}
  .si{flex:1;border:none;background:transparent;color:var(--text);font-size:.9rem;outline:none;font-family:inherit;min-width:0}
  .si::placeholder{color:var(--text-m)}
  .sx{appearance:none;border:none;background:none;color:var(--text-m);cursor:pointer;font-size:.78rem;padding:2px 5px;border-radius:4px;display:none;transition:color .15s}.sx.on{display:block}.sx:hover{color:var(--accent)}

  .hero-date{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 16px 4px}
  .h-arrow{appearance:none;border:1px solid var(--border);background:var(--surface-s);color:var(--text-m);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .18s}
  .h-arrow:hover{color:var(--accent);border-color:var(--accent)}
  .h-arrow[disabled]{opacity:.25;cursor:not-allowed;transform:none}
  .h-arrow.hide{visibility:hidden;pointer-events:none}
  .h-arrow svg{pointer-events:none}
  .hero-center{text-align:center;min-width:160px}
  .hero-main{font-size:1.1rem;font-weight:780;letter-spacing:-.02em;color:var(--text);line-height:1.3}
  .hero-sub{font-size:.72rem;color:var(--text-m);margin-top:1px;font-variant-numeric:tabular-nums}
  .vtabs{display:flex;align-items:center;justify-content:center;gap:3px;padding:4px 16px 10px}
  .vt{appearance:none;border:1px solid transparent;background:transparent;color:var(--text-m);padding:5px 14px;border-radius:999px;font-size:.8rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
  .vt:hover{color:var(--accent)}
  .vt.active{background:var(--accent-s);color:var(--accent);font-weight:650;border-color:rgba(184,92,56,.15)}
  .vt:focus-visible{outline:none;box-shadow:0 0 0 2px var(--accent-s)}
  .vt-sep{width:1px;height:14px;background:var(--border);margin:0 4px;flex-shrink:0}
  .notice{display:flex;align-items:center;gap:8px;padding:9px 16px;border-top:1px solid var(--border);background:var(--accent-s);font-size:.78rem;color:var(--text-m);line-height:1.4}
  .notice svg{flex-shrink:0;color:var(--accent)}

  /* ── Toolbar ── */
  .tb-wrap{margin-bottom:16px}
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;padding:7px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-s);box-shadow:var(--shadow-xs)}
  .tb-wrap.fp-on .toolbar{border-radius:var(--r-s) var(--r-s) 0 0}
  .tb-l{display:flex;align-items:center;gap:7px;flex-wrap:wrap;min-width:0}
  .tb-count{font-size:.78rem;font-weight:600;color:var(--text-m);white-space:nowrap}.tb-count b{color:var(--text);font-weight:700}
  .tb-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
  .tb-btn{appearance:none;border:1px solid var(--border);background:var(--surface-s);color:var(--text-m);padding:4px 10px;border-radius:999px;font-size:.74rem;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px;min-height:26px;transition:all .15s;white-space:nowrap}
  .tb-btn:hover{border-color:var(--accent);color:var(--accent)}
  .tb-btn svg{pointer-events:none}
  .tb-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;display:none}.tb-dot.on{display:block}

  .af{display:inline-flex;align-items:center;gap:4px;padding:3px 6px 3px 8px;border-radius:999px;background:var(--accent-s);color:var(--accent);font-size:.72rem;font-weight:600;white-space:nowrap}
  .af-x{appearance:none;border:none;background:none;color:inherit;cursor:pointer;padding:0 2px;font-size:.68rem;opacity:.65;line-height:1}.af-x:hover{opacity:1}

  .fp{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r-s) var(--r-s);max-height:0;overflow:hidden;transition:max-height .26s ease}
  .fp.open{max-height:600px}
  .fp-sec{padding:10px 14px;border-bottom:1px solid var(--border)}.fp-sec:last-child{border-bottom:none}
  .fp-label{font-size:.68rem;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
  .fp-chips{display:flex;flex-wrap:wrap;gap:5px}
  .chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;border:1px solid var(--border);background:var(--tag-bg);color:var(--tag-c);font-size:.76rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
  .chip:hover{border-color:var(--accent);color:var(--accent)}
  .chip.active{background:var(--active-bg);color:var(--active-c);border-color:var(--active-bg);font-weight:600}
  .chip:focus-visible{outline:none;box-shadow:0 0 0 2px var(--accent-s)}

  /* ── Cards ── */
  @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .items{display:flex;flex-direction:column;gap:10px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;animation:fadeUp .24s ease both;transition:box-shadow .18s,border-color .18s,transform .18s;border-left:2px solid var(--border)}
  .card:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
  .card-hot{border-left:4px solid var(--imp5)}
  .card-imp{border-left:3px solid var(--imp4)}
  .card-minor .card-title a{color:var(--text-2)}.card-minor .card-summary{opacity:.85}
  .card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
  .card-tw{flex:1;min-width:0}
  .card-title{font-size:.96rem;font-weight:700;line-height:1.45;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
  .card-title a{color:var(--text);text-decoration:none}.card-title a:hover{color:var(--accent)}
  .imp-lbl{display:inline-flex;align-items:center;padding:1px 7px;border-radius:5px;font-size:.68rem;font-weight:700;flex-shrink:0;letter-spacing:.02em}
  .imp-lbl.hot{background:rgba(194,68,68,.12);color:var(--imp5)}
  .imp-lbl.imp{background:rgba(204,126,48,.12);color:var(--imp4)}
  .card-sub{font-size:.76rem;color:var(--text-m);margin-top:2px;line-height:1.4}
  .card-actions{display:flex;align-items:center;gap:3px;flex-shrink:0;margin-top:2px}
  .cb{appearance:none;border:1px solid transparent;background:none;color:var(--text-m);width:26px;height:26px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
  .cb svg{pointer-events:none}
  .cb:hover{border-color:var(--border);background:var(--surface-s);color:var(--text)}
  .cb:focus-visible{outline:none;box-shadow:0 0 0 2px var(--accent-s)}
  .card-summary{font-size:.88rem;color:var(--text-m);line-height:1.7;margin-bottom:8px}.card-summary.hidden{display:none}
  .card-foot{display:flex;align-items:center;flex-wrap:wrap;gap:5px}
  .tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.72rem;background:var(--tag-bg);color:var(--tag-c)}
  .card-src{font-size:.76rem;color:var(--text-m);margin-left:auto;white-space:nowrap}
  .card-src a{color:var(--text-m);text-decoration:none}.card-src a:hover{color:var(--accent)}
  .card-time{font-size:.72rem;color:var(--text-m);font-variant-numeric:tabular-nums}

  /* ── Timeline ── */
  .timeline{position:relative;padding-left:26px}
  .timeline::before{content:'';position:absolute;left:8px;top:28px;bottom:28px;width:2px;background:var(--border);border-radius:1px}
  .day-sec{position:relative}
  .day-sec::before{content:'';position:absolute;left:-26px;top:15px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);z-index:1}
  .day-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:8px 0;margin-bottom:8px}
  .day-title{font-size:.94rem;font-weight:780;letter-spacing:-.01em}
  .day-count{font-size:.78rem;color:var(--text-m)}

  .empty{text-align:center;padding:56px 20px;color:var(--text-m)}
  .empty .ei{font-size:2.2rem;display:block;margin-bottom:12px;opacity:.5}
  .empty h2{font-size:1.02rem;margin-bottom:5px;color:var(--text)}.empty p{font-size:.86rem;line-height:1.55}
  .empty-actions{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
  .empty-btn{appearance:none;border:1px solid var(--border);background:var(--surface-s);color:var(--text-2);padding:6px 14px;border-radius:999px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
  .empty-btn:hover{border-color:var(--accent);color:var(--accent)}
  .ad-wrap{text-align:center;min-height:0;overflow:hidden;border-radius:var(--r-s)}
  .ad-wrap ins{border-radius:var(--r-s)}
  .ad-inline{margin:8px 0}
  .loading{text-align:center;padding:52px;color:var(--text-m);font-size:.86rem}
  @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}
  .loading::after{content:'';display:inline-block;width:5px;height:5px;background:var(--accent);border-radius:50%;margin-left:7px;animation:pulse 1.1s ease-in-out infinite;vertical-align:middle}

  .toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);padding:8px 18px;border-radius:999px;font-size:.82rem;font-weight:600;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:999;white-space:nowrap;box-shadow:var(--shadow-md)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .btt{position:fixed;bottom:26px;right:18px;width:38px;height:38px;border-radius:50%;background:var(--surface-s);border:1px solid var(--border);color:var(--text-m);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(10px);pointer-events:none;transition:opacity .22s,transform .22s,border-color .18s,color .18s;z-index:150;box-shadow:var(--shadow-sm)}
  .btt.on{opacity:1;transform:none;pointer-events:all}.btt:hover{border-color:var(--accent);color:var(--accent)}.btt svg{pointer-events:none}

  footer{max-width:720px;margin:0 auto;padding:0 16px 44px;text-align:center}
  .f-links{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;font-size:.78rem;color:var(--text-m);margin-bottom:5px}
  .f-links a{color:var(--text-m);text-decoration:none;padding:2px 4px;transition:color .15s}.f-links a:hover{color:var(--accent)}
  .f-sep{opacity:.3}
  .f-copy{font-size:.7rem;color:var(--text-m);opacity:.5}

  @media(max-width:640px){
    header{padding:0 14px}main{padding:18px 12px 32px}
    .brand-sub{display:none}.hero-main{font-size:1.2rem}
    .timeline{padding-left:0}.timeline::before{display:none}.day-sec::before{display:none}
    .card{padding:14px 14px}
  }
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <div class="h-inner">
    <a class="brand" href="https://kingcos.me" target="_blank" rel="noopener" title="kingcos.me">
      <div class="brand-logo">K</div>
      <div><div class="site-title">AI 日报</div><div class="brand-sub">kingcos.me</div></div>
    </a>
    <div class="h-actions">
      <button class="ib" id="share-btn" type="button" title="分享" aria-label="分享此页">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16,6 12,2 8,6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      </button>
      <button class="ib" id="theme-btn" type="button" aria-label="切换主题">🌙</button>
    </div>
  </div>
</header>

<main>
  <section class="hero" id="hero" style="display:none">
    <div class="search-row">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="si" id="si" type="search" placeholder="搜索标题、摘要、标签、来源…" autocomplete="off" spellcheck="false">
      <button class="sx" id="sx" type="button" aria-label="清空">✕</button>
    </div>
    <div class="hero-date">
      <button class="h-arrow" id="prev-btn" type="button" aria-label="前一天">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
      </button>
      <div class="hero-center">
        <div class="hero-main" id="h-main">—</div>
        <div class="hero-sub" id="h-sub"></div>
      </div>
      <button class="h-arrow" id="next-btn" type="button" aria-label="后一天">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>
      </button>
    </div>
    <div class="vtabs">
      <button class="vt active" id="vt-day" type="button">日</button>
      <button class="vt" id="vt-week" type="button">周</button>
      <button class="vt" id="vt-all" type="button">全部</button>
      <span class="vt-sep"></span>
      <button class="vt" id="vt-cal" type="button" title="选择日期">📅</button>
    </div>
    <div class="notice" id="notice" style="display:none">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="notice-text"></span>
    </div>
  </section>

  <div class="tb-wrap" id="tb-wrap" style="display:none">
    <div class="toolbar">
      <div class="tb-l">
        <span class="tb-count" id="tb-count">—</span>
        <span id="tb-pills"></span>
      </div>
      <div class="tb-r">
        <button class="tb-btn" id="sort-btn" type="button" title="切换排序">重要性↓</button>
        <button class="tb-btn" id="lang-btn" type="button" title="切换语言">中</button>
        <button class="tb-btn" id="filter-btn" type="button" title="标签和来源筛选">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polygon points="22,3 2,3 10,12.46 10,19 14,21 14,12.46"/></svg>
          筛选
          <span class="tb-dot" id="filter-dot"></span>
        </button>
      </div>
    </div>
    <div class="fp" id="fp">
      <div class="fp-sec"><div class="fp-label">标签</div><div class="fp-chips" id="fc-tag"></div></div>
      <div class="fp-sec"><div class="fp-label">来源</div><div class="fp-chips" id="fc-src"></div></div>
    </div>
  </div>

  <div id="content"><div class="loading">正在加载数据</div></div>
</main>

<button class="btt" id="btt" aria-label="回到顶部">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polyline points="18,15 12,9 6,15"/></svg>
</button>
<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<div class="ad-wrap" style="max-width:720px;margin:0 auto 20px;padding:0 16px">
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9925978992661955" data-ad-slot="5464406757" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
</div>
<footer>
  <div class="f-links">
    <a href="https://kingcos.me" target="_blank" rel="noopener">kingcos.me</a><span class="f-sep">·</span>
    <a href="https://github.com/kingcos/ai-daily" target="_blank" rel="noopener">GitHub</a><span class="f-sep">·</span>
    <a href="./data/index.json" target="_blank" rel="noopener">JSON</a>
  </div>
  <div class="f-copy">AI 日报 · 精选 AI 行业每日动态</div>
</footer>

<input type="date" id="dp" style="position:fixed;opacity:0;pointer-events:none;top:0;left:0;width:1px;height:1px">

<script>
const IDX='./data/index.json',TZ='Asia/Shanghai';
let meta=null,curDate=null,allItems=[],mode='day',sortMode='importance',
    defLang=localStorage.getItem('ai-daily-lang')||'zh',
    cache=new Map(),af={tag:null,src:null,q:''},tt=null,fpOpen=false,
    allSources=new Set();

const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const WD=['日','一','二','三','四','五','六'];

function fmtDT(iso){if(!iso)return'';try{return new Intl.DateTimeFormat('zh-CN',{timeZone:TZ,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(iso))}catch{return iso}}
function fmtHM(iso){if(!iso)return'';try{return new Intl.DateTimeFormat('zh-CN',{timeZone:TZ,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(iso))}catch{return''}}
function searchTxt(i){return[i.title_zh,i.title_en,i.summary_zh,i.summary_en,i.source_name,(i.tags||[]).join(' ')].join(' ').toLowerCase()}
function d2ymd(d){const p=new Intl.DateTimeFormat('en-CA',{timeZone:TZ,year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(d);const g=t=>p.find(x=>x.type===t)?.value;return`${g('year')}-${g('month')}-${g('day')}`}
function today(){return d2ymd(new Date())}
function yest(){const d=new Date();d.setDate(d.getDate()-1);return d2ymd(d)}
function weekDates(anchor){
  const ds=meta?.dates||[];if(!anchor)return[];
  const[y,m,d]=anchor.split('-').map(Number),a=new Date(Date.UTC(y,m-1,d));
  const mon=new Date(a);mon.setUTCDate(a.getUTCDate()-(a.getUTCDay()+6)%7);
  const sun=new Date(mon);sun.setUTCDate(mon.getUTCDate()+6);
  return ds.filter(dt=>{const[y2,m2,d2]=dt.split('-').map(Number);const x=new Date(Date.UTC(y2,m2-1,d2));return x>=mon&&x<=sun});
}
function adjDate(dir){const ds=meta?.dates||[],i=ds.indexOf(curDate);if(i<0)return null;return dir==='prev'?(i<ds.length-1?ds[i+1]:null):(i>0?ds[i-1]:null)}

function toast(m){const e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('show'),2400)}
async function clip(t){try{await navigator.clipboard.writeText(t)}catch{const a=Object.assign(document.createElement('textarea'),{value:t,style:'position:fixed;opacity:0'});document.body.appendChild(a);a.select();try{document.execCommand('copy')}catch{};a.remove()}}
async function sharePage(){const u=location.href;if(navigator.share){try{await navigator.share({title:'AI 日报·kingcos.me',url:u});return}catch{}};await clip(u);toast('页面链接已复制 ✓')}
function shareCard(b){const u=b.dataset.url;if(u)clip(u).then(()=>toast('文章链接已复制 ✓'))}

function setLang(l){
  defLang=l;localStorage.setItem('ai-daily-lang',l);
  document.querySelectorAll('.card').forEach(c=>{const ss=c.querySelectorAll('.card-summary');if(ss.length<2)return;ss.forEach(s=>{if(s.id.startsWith('zh-'))s.classList.toggle('hidden',l!=='zh');else if(s.id.startsWith('en-'))s.classList.toggle('hidden',l!=='en')})});
  $('lang-btn').textContent=l==='zh'?'中':'EN';
}
function togLang(id){const z=$('zh-'+id),e=$('en-'+id);if(!z||!e)return;const s=!z.classList.contains('hidden');z.classList.toggle('hidden',s);e.classList.toggle('hidden',!s)}

function heroDate(d){
  const[y,m,dd]=d.split('-').map(Number),dt=new Date(d+'T00:00:00'),wd=WD[dt.getDay()],td=today(),ys=yest();
  let pfx='';if(d===td)pfx='今日 · ';else if(d===ys)pfx='昨日 · ';
  return{main:`${pfx}${m}月${dd}日 · 周${wd}`,sub:String(y)};
}
function shortD(d){const[,m,dd]=d.split('-').map(Number);return`${m}月${dd}日`}

function updateHero(){
  const hm=$('h-main'),hs=$('h-sub'),pb=$('prev-btn'),nb=$('next-btn');
  if(mode==='day'){
    const{main,sub}=heroDate(curDate||today());hm.textContent=main;hs.textContent=sub;
    pb.classList.remove('hide');nb.classList.remove('hide');
    pb.disabled=!adjDate('prev');nb.disabled=!adjDate('next');
  }else if(mode==='week'){
    const wd=weekDates(today());hm.textContent='本周';
    hs.textContent=wd.length?`${shortD(wd[wd.length-1])} – ${shortD(wd[0])}`:'';
    pb.classList.add('hide');nb.classList.add('hide');
  }else{
    const ds=meta?.dates||[];hm.textContent='全部新闻';
    hs.textContent=ds.length?`${ds.length} 天 · ${shortD(ds[ds.length-1])} – ${shortD(ds[0])}`:'';
    pb.classList.add('hide');nb.classList.add('hide');
  }
  ['vt-day','vt-week','vt-all'].forEach(id=>$(id)?.classList.remove('active'));
  $('vt-'+(mode==='day'?'day':mode==='week'?'week':'all'))?.classList.add('active');
}

function showNotice(lat){const el=$('notice'),tx=$('notice-text');if(!el)return;const td=today();if(lat&&lat!==td){tx.textContent=`今日（${td}）数据尚未生成，当前显示 ${lat} 的内容`;el.style.display='flex'}else el.style.display='none'}

function renderCard(it){
  const both=!!(it.summary_en&&it.summary_zh),ti=it.title_zh||it.title_en||'（无标题）',sub=it.title_zh&&it.title_en?it.title_en:'';
  const n=Math.max(1,Math.min(5,Math.round(it.importance||3)));
  const tags=cleanTags(it.tags).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  const zhH=defLang==='en'&&both?' hidden':'',enH=defLang==='zh'||!both?' hidden':'';
  const cls=n>=5?'card card-hot':n>=4?'card card-imp':n<=2?'card card-minor':'card';
  const badge=n>=5?'<span class="imp-lbl hot">热点</span>':n>=4?'<span class="imp-lbl imp">重要</span>':'';
  return`
<div class="${cls}" data-tags="${esc(cleanTags(it.tags).join(','))}" data-src="${esc(it.source_name||'')}" data-s="${esc(searchTxt(it))}">
  <div class="card-head">
    <div class="card-tw">
      <div class="card-title">${badge}<a href="${esc(it.source_url||'#')}" target="_blank" rel="noopener">${esc(ti)}</a></div>
      ${sub?`<div class="card-sub">${esc(sub)}</div>`:''}
    </div>
    <div class="card-actions">
      ${it.source_url?`<button class="cb" data-url="${esc(it.source_url)}" onclick="shareCard(this)" title="复制链接"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></button>`:''}
      ${both?`<button class="cb" onclick="togLang('${it.id}')" title="切换中/英"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></button>`:''}
    </div>
  </div>
  ${it.summary_zh?`<div class="card-summary${zhH}" id="zh-${it.id}">${esc(it.summary_zh)}</div>`:''}
  ${it.summary_en?`<div class="card-summary${enH}" id="en-${it.id}">${esc(it.summary_en)}</div>`:''}
  <div class="card-foot">${tags}${it.published_at?`<span class="card-time">${fmtHM(it.published_at)}</span>`:''}<span class="card-src"><a href="${esc(it.source_url||'#')}" target="_blank" rel="noopener">${esc(it.source_name||'')}</a></span></div>
</div>`;
}

function applyFilters(){
  const kw=af.q.trim().toLowerCase();let vis=0;
  document.querySelectorAll('.card').forEach(c=>{
    const tags=(c.dataset.tags||'').split(',').filter(Boolean);
    const ok=(!af.tag||tags.includes(af.tag))&&(!af.src||c.dataset.src===af.src)&&(!kw||(c.dataset.s||'').includes(kw));
    c.style.display=ok?'':'none';if(ok)vis++;
  });
  document.querySelectorAll('.day-sec').forEach(s=>{let any=false;s.querySelectorAll('.card').forEach(c=>{if(c.style.display!=='none')any=true});s.style.display=any?'':'none'});
  const ee=$('filt-empty');
  if(!vis){if(!ee){const d=document.createElement('div');d.id='filt-empty';d.className='empty';d.innerHTML='<span class="ei">🔍</span><h2>没有匹配结果</h2><p>试试放宽标签或来源筛选。</p><div class="empty-actions"><button class="empty-btn" onclick="clearAll()">清除所有筛选</button></div>';$('content').appendChild(d)}}else ee?.remove();
  updatePills();
}

function buildChips(items){
  const ts=new Set(),ss=new Set();
  items.forEach(i=>{cleanTags(i.tags).forEach(t=>ts.add(t));if(i.source_name)ss.add(i.source_name)});
  if(af.tag&&!ts.has(af.tag))af.tag=null;if(af.src&&!ss.has(af.src))af.src=null;
  function fill(id,key,vals,act){
    const el=$(id);el.innerHTML='';
    const all=Object.assign(document.createElement('span'),{className:'chip'+(!act?' active':''),textContent:'全部',tabIndex:0});
    all.dataset.f=key;all.dataset.v='all';el.appendChild(all);
    [...vals].sort().forEach(v=>{const c=Object.assign(document.createElement('span'),{className:'chip'+(act===v?' active':''),textContent:v,tabIndex:0});c.dataset.f=key;c.dataset.v=v;el.appendChild(c)});
  }
  fill('fc-tag','tag',ts,af.tag);fill('fc-src','src',ss,af.src);updatePills();
}
function updatePills(){
  const active=!!(af.tag||af.src);$('filter-dot')?.classList.toggle('on',active);
  const box=$('tb-pills');box.innerHTML='';
  if(af.tag)box.appendChild(mkPill('tag',af.tag));if(af.src)box.appendChild(mkPill('src',af.src));
}
function mkPill(t,v){const s=document.createElement('span');s.className='af';s.innerHTML=`${esc(v)} <button class="af-x" aria-label="移除">✕</button>`;s.querySelector('.af-x').addEventListener('click',e=>{e.stopPropagation();rmF(t)});return s}
function rmF(t){if(t==='tag')af.tag=null;else af.src=null;buildChips(allItems);applyFilters()}
function clearAll(){af.tag=null;af.src=null;af.q='';$('si').value='';$('sx').classList.remove('on');buildChips(allItems);applyFilters()}

function setCount(n){const e=$('tb-count');if(e)e.innerHTML=n!=null?`<b>${n}</b> 条新闻`:'—'}
function sortItems(items){const a=(items||[]).slice(),t=x=>x?.published_at?new Date(x.published_at).getTime():0;if(sortMode==='time')return a.sort((a,b)=>t(b)-t(a)||(b.importance||0)-(a.importance||0));return a.sort((a,b)=>(b.importance||0)-(a.importance||0)||t(b)-t(a))}
function cleanTags(tags){return(tags||[]).filter(t=>!allSources.has(t))}
async function fetchDay(d){if(cache.has(d))return cache.get(d);const r=await fetch(`./data/${d}.json`);if(!r.ok)throw new Error('HTTP '+r.status);const j=await r.json();(j.items||[]).forEach(i=>{if(i.source_name)allSources.add(i.source_name)});cache.set(d,j);return j}

function setTitle(t){document.title=t?`AI 日报 · ${t}`:'AI 日报 · kingcos.me'}
function getUrl(){const u=new URL(location.href);return{mode:u.searchParams.get('mode'),date:u.searchParams.get('date')}}
function setUrl(n){const u=new URL(location.href);n.mode?u.searchParams.set('mode',n.mode):u.searchParams.delete('mode');n.date?u.searchParams.set('date',n.date):u.searchParams.delete('date');history.replaceState(null,'',u.toString())}

function show(){$('hero').style.display='';$('tb-wrap').style.display=''}
function emptyH(t,s,actions){return`<div class="empty"><span class="ei">📭</span><h2>${t}</h2><p>${s}</p>${actions?`<div class="empty-actions">${actions}</div>`:''}</div>`}

function renderDay(data,noticeDate){
  mode='day';curDate=data?.date||curDate;allItems=sortItems(data?.items||[]);
  show();updateHero();buildChips(allItems);setCount(allItems.length);setTitle(curDate);
  noticeDate?showNotice(noticeDate):$('notice').style.display='none';
  const c=$('content');
  if(!allItems.length){c.innerHTML=emptyH('暂无新闻数据',`${esc(curDate)} 暂无数据。`,`<button class="empty-btn" onclick="navPrev()">查看前一天</button><button class="empty-btn" onclick="showAll()">查看全部</button>`);return}
  c.innerHTML=`<div class="items">${allItems.map(renderCard).join('')}</div>`;applyFilters();
}
function renderSections(dates,byDate){
  const secs=dates.map(d=>({date:d,items:sortItems(byDate.get(d)||[])}));allItems=secs.flatMap(s=>s.items);
  show();updateHero();buildChips(allItems);setCount(allItems.length);setTitle(mode==='week'?'本周':'全部');$('notice').style.display='none';
  const adUnit='<div class="ad-wrap ad-inline"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9925978992661955" data-ad-slot="5464406757" data-ad-format="fluid" data-ad-layout="in-article"></ins></div>';
  const html=secs.map((s,i)=>{const sec=`<section class="day-sec"><div class="day-head"><div class="day-title">${esc(s.date)}</div><div class="day-count">${s.items.length?s.items.length+' 条':'暂无'}</div></div><div class="items">${s.items.map(renderCard).join('')}</div></section>`;return i>0&&i%3===0?adUnit+sec:sec}).join('');
  $('content').innerHTML=html?`<div class="timeline">${html}</div>`:emptyH('暂无新闻数据','当前范围暂无数据。');applyFilters();
  document.querySelectorAll('.ad-inline ins.adsbygoogle').forEach(el=>{if(!el.dataset.adsbygoogleStatus)try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch{}});
}
async function goDate(d,noticeDate){
  mode='day';curDate=d;updateHero();setUrl({mode:'day',date:d});
  if(!(meta?.dates||[]).includes(d)){show();buildChips([]);setCount(0);setTitle(d);$('notice').style.display='none';$('content').innerHTML=emptyH('暂无新闻数据',`${esc(d)} 暂无数据。`,`<button class="empty-btn" onclick="navPrev()">查看前一天</button><button class="empty-btn" onclick="showAll()">查看全部</button>`);return}
  try{renderDay(await fetchDay(d),noticeDate)}catch(e){$('content').innerHTML=emptyH('加载失败',`${esc(d)} 加载出错。`)}
}
async function showAll(){mode='all';curDate=today();updateHero();setUrl({mode:'all',date:null});const ds=meta?.dates||[],bd=new Map();await Promise.all(ds.map(async d=>{try{bd.set(d,(await fetchDay(d))?.items||[])}catch{bd.set(d,[])}}));renderSections(ds,bd)}
async function showWeek(){mode='week';curDate=today();updateHero();setUrl({mode:'week',date:null});const wd=weekDates(today()),bd=new Map();await Promise.all(wd.map(async d=>{try{bd.set(d,(await fetchDay(d))?.items||[])}catch{bd.set(d,[])}}));renderSections(wd,bd)}
async function navPrev(){const p=adjDate('prev');if(p)await goDate(p)}
async function navNext(){const n=adjDate('next');if(n)await goDate(n)}

async function load(){
  const tb=$('theme-btn');
  const curTh=()=>{if(document.documentElement.dataset.theme==='dark')return'dark';if(document.documentElement.dataset.theme==='light')return'light';return matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'};
  const syncTh=()=>{tb.textContent=curTh()==='dark'?'☀️':'🌙'};
  tb.addEventListener('click',()=>{const n=curTh()==='dark'?'light':'dark';document.documentElement.dataset.theme=n;localStorage.setItem('ai-daily-theme',n);syncTh()});syncTh();

  $('si').addEventListener('input',function(){af.q=this.value;$('sx').classList.toggle('on',!!this.value);applyFilters()});
  $('sx').addEventListener('click',()=>{$('si').value='';af.q='';$('sx').classList.remove('on');$('si').focus();applyFilters()});

  const sb=$('sort-btn');
  sb.addEventListener('click',async()=>{sortMode=sortMode==='importance'?'time':'importance';sb.textContent=sortMode==='importance'?'重要性↓':'时间↓';if(mode==='all')await showAll();else if(mode==='week')await showWeek();else await goDate(curDate)});

  $('lang-btn').textContent=defLang==='zh'?'中':'EN';
  $('lang-btn').addEventListener('click',()=>setLang(defLang==='zh'?'en':'zh'));

  const fpBtn=$('filter-btn'),fpEl=$('fp'),tbw=$('tb-wrap');
  fpBtn.addEventListener('click',()=>{fpOpen=!fpOpen;fpEl.classList.toggle('open',fpOpen);tbw.classList.toggle('fp-on',fpOpen)});
  ['fc-tag','fc-src'].forEach(id=>{$(id)?.addEventListener('click',e=>{const c=e.target.closest('.chip');if(!c)return;const f=c.dataset.f,v=c.dataset.v;document.querySelectorAll(`#${id} .chip`).forEach(x=>x.classList.remove('active'));c.classList.add('active');if(f==='tag')af.tag=v==='all'?null:v;if(f==='src')af.src=v==='all'?null:v;applyFilters()})});

  $('share-btn').addEventListener('click',sharePage);
  const btt=$('btt');window.addEventListener('scroll',()=>btt.classList.toggle('on',scrollY>400),{passive:true});
  btt.addEventListener('click',()=>scrollTo({top:0,behavior:'smooth'}));
  $('prev-btn').addEventListener('click',navPrev);$('next-btn').addEventListener('click',navNext);

  $('vt-day').addEventListener('click',()=>{const td=today(),ds=new Set(meta?.dates||[]);goDate(ds.has(td)?td:meta?.dates?.[0]||td)});
  $('vt-week').addEventListener('click',showWeek);$('vt-all').addEventListener('click',showAll);
  const dp=$('dp');$('vt-cal').addEventListener('click',()=>{dp.showPicker?dp.showPicker():dp.click()});
  dp.addEventListener('change',()=>{if(dp.value){goDate(dp.value);dp.value=''}});

  try{
    const r=await fetch(IDX);if(!r.ok)throw new Error('HTTP '+r.status);meta=await r.json();
    const ds=meta?.dates||[];if(ds.length){dp.min=ds[ds.length-1];dp.max=ds[0]}
    const{mode:um,date:ud}=getUrl();
    if(um==='all'){await showAll();return}if(um==='week'){await showWeek();return}
    const td=today(),avail=new Set(ds);
    if(ud)await goDate(ud);
    else if(avail.has(td))await goDate(td);
    else{const lat=ds[0]||td;await goDate(lat,lat!==td?lat:null)}
  }catch(e){setTitle('加载失败');$('content').innerHTML=emptyH('数据加载失败','请确认已通过 GitHub Pages 访问，且数据文件已生成。')}
}
load();
</script>
</body>
</html>
