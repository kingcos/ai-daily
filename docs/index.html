<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 日报</title>
<script>
  (() => {
    const savedTheme = localStorage.getItem('ai-daily-theme');
    if (savedTheme === 'dark' || savedTheme === 'light') {
      document.documentElement.dataset.theme = savedTheme;
    }
  })();
</script>
<style>
  :root {
    --bg: #f4efe7;
    --surface: rgba(255, 252, 247, 0.9);
    --surface-strong: #fffaf3;
    --border: #e5d8c7;
    --text: #2f2419;
    --text-muted: #7b6a57;
    --accent: #b85c38;
    --accent-soft: rgba(184, 92, 56, 0.12);
    --tag-bg: #efe2d1;
    --tag-text: #6e513d;
    --imp1: #b1a79a;
    --imp2: #6ea8c8;
    --imp3: #6a9a72;
    --imp4: #d8893a;
    --imp5: #d15a5a;
    --filter-active-bg: #b85c38;
    --filter-active-text: #fff;
    --shadow: 0 16px 40px rgba(78, 50, 22, 0.08);
    --radius: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #14110f;
      --surface: rgba(33, 27, 24, 0.92);
      --surface-strong: #201916;
      --border: #3a2f2a;
      --text: #f7efe5;
      --text-muted: #bea68e;
      --accent: #f2a65a;
      --accent-soft: rgba(242, 166, 90, 0.14);
      --tag-bg: #2d2521;
      --tag-text: #dfc2a3;
      --imp1: #82776b;
      --imp2: #5e92b2;
      --imp3: #5a8f65;
      --imp4: #d08a3f;
      --imp5: #d96b6b;
      --filter-active-bg: #f2a65a;
      --filter-active-text: #1c1612;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
    }
  }
  :root[data-theme="dark"] {
    --bg: #14110f;
    --surface: rgba(33, 27, 24, 0.92);
    --surface-strong: #201916;
    --border: #3a2f2a;
    --text: #f7efe5;
    --text-muted: #bea68e;
    --accent: #f2a65a;
    --accent-soft: rgba(242, 166, 90, 0.14);
    --tag-bg: #2d2521;
    --tag-text: #dfc2a3;
    --imp1: #82776b;
    --imp2: #5e92b2;
    --imp3: #5a8f65;
    --imp4: #d08a3f;
    --imp5: #d96b6b;
    --filter-active-bg: #f2a65a;
    --filter-active-text: #1c1612;
    --shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: light dark; }
  body {
    font-family: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at top left, var(--accent-soft), transparent 32%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 30%);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--surface);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 920px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .site-title {
    font-size: 1.28rem;
    font-weight: 780;
    letter-spacing: -0.03em;
  }
  .subtitle {
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .icon-btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--surface-strong);
    color: var(--text);
    border-radius: 999px;
    width: 40px;
    height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s, background 0.2s;
  }
  .icon-btn:hover { border-color: var(--accent); transform: translateY(-1px); }
  .icon-btn:active { transform: translateY(0); }
  .icon-btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--accent-soft);
    border-color: var(--accent);
  }
  .icon-btn[disabled] { opacity: 0.45; cursor: not-allowed; transform: none; }

  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 18px 16px 24px;
  }

  /* Date + Filters module */
  .module {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    overflow: clip;
  }
  .module-head {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .date-nav {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  
  .seg {
    display: inline-flex;
    align-items: center;
    border: 1px solid var(--border);
    background: var(--surface-strong);
    border-radius: 999px;
    overflow: hidden;
  }
  .seg button {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--text-muted);
    padding: 9px 12px;
    font-size: 0.84rem;
    cursor: pointer;
    min-height: 40px;
    transition: background 0.15s, color 0.15s;
  }
  .seg button:hover { color: var(--accent); }
  .seg button.active {
    background: var(--filter-active-bg);
    color: var(--filter-active-text);
  }
  .seg button:focus-visible {
    outline: none;
    box-shadow: inset 0 0 0 2px var(--accent);
  }

  .date-picker {
    appearance: none;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--surface-strong);
    color: var(--text);
    padding: 10px 12px;
    font-size: 0.9rem;
    min-height: 40px;
    outline: none;
  }
  .date-picker:focus-visible {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .range-pill {
    display: inline-flex;
    align-items: center;
    padding: 10px 12px;
    min-height: 40px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface-strong);
    color: var(--text-muted);
    font-size: 0.9rem;
    white-space: nowrap;
  }

  /* Collapsible filters */
  details.filters > summary {
    list-style: none;
    padding: 12px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    user-select: none;
    border-top: 1px solid var(--border);
  }
  details.filters > summary:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  details.filters > summary::-webkit-details-marker { display: none; }
  .summary-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .summary-title {
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .summary-meta {
    font-size: 0.82rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 54ch;
  }
  .summary-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chev { color: var(--text-muted); transition: transform 0.18s ease; }
  details.filters[open] .chev { transform: rotate(180deg); }

  .filters-body {
    padding: 12px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    min-width: 44px;
  }

  .search-input {
    appearance: none;
    width: min(100%, 520px);
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--surface-strong);
    color: var(--text);
    padding: 10px 12px;
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus-visible {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .chip {
    display: inline-flex;
    align-items: center;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 0.82rem;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    color: var(--tag-text);
    transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.15s;
    user-select: none;
    min-height: 36px;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .chip:active { transform: translateY(0); }
  .chip.active {
    background: var(--filter-active-bg);
    color: var(--filter-active-text);
    border-color: var(--filter-active-bg);
  }

  .muted {
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  /* Items */
  .items-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .day-section {
    margin-top: 8px;
  }
  .day-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 12px;
    margin: 6px 4px 10px;
    color: var(--text);
  }
  .day-title {
    font-size: 0.98rem;
    font-weight: 780;
    letter-spacing: -0.01em;
  }
  .day-sub {
    font-size: 0.84rem;
    color: var(--text-muted);
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    gap: 14px;
    box-shadow: var(--shadow);
  }
  .imp-badge {
    flex-shrink: 0;
    width: 6px;
    border-radius: 999px;
    background: var(--imp1);
  }
  .imp-1 { background: var(--imp1); }
  .imp-2 { background: var(--imp2); }
  .imp-3 { background: var(--imp3); }
  .imp-4 { background: var(--imp4); }
  .imp-5 { background: var(--imp5); }

  .card-body { flex: 1; min-width: 0; }
  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .card-title {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .card-title a {
    color: var(--text);
    text-decoration: none;
  }
  .card-title a:hover { color: var(--accent); }

  .card-title-en {
    font-size: 0.84rem;
    color: var(--text-muted);
    margin: -2px 0 10px;
  }

  .card-summary {
    font-size: 0.92rem;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 10px;
  }
  .card-summary.hidden { display: none; }

  .toggle-lang {
    background: var(--surface-strong);
    border: 1px solid var(--border);
    border-radius: 999px;
    width: 36px;
    height: 36px;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    transition: border-color 0.2s, transform 0.2s;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .toggle-lang:hover { border-color: var(--accent); transform: translateY(-1px); }
  .toggle-lang:active { transform: translateY(0); }
  .toggle-lang:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--accent-soft);
    border-color: var(--accent);
  }
  .toggle-lang.hidden { display: none; }

  .card-footer {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 2px;
  }
  .tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.78rem;
    background: var(--tag-bg);
    color: var(--tag-text);
  }
  .card-source {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-left: auto;
    white-space: nowrap;
  }
  .card-source a { color: var(--text-muted); text-decoration: none; }
  .card-source a:hover { color: var(--accent); }
  .card-date {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .empty-state {
    text-align: center;
    padding: 56px 20px;
    color: var(--text-muted);
  }
  .empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 0.92rem; }

  .loading {
    text-align: center;
    padding: 42px;
    color: var(--text-muted);
    font-size: 0.92rem;
  }

  footer {
    max-width: 920px;
    margin: 0 auto;
    padding: 0 16px 34px;
    color: var(--text-muted);
    font-size: 0.84rem;
    text-align: center;
  }
  footer a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }
  footer a:hover {
    color: var(--accent);
    border-color: currentColor;
  }

  @media (max-width: 720px) {
    header { padding: 12px 14px; }
    main { padding: 14px 14px 22px; }
    .summary-meta { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; scroll-behavior: auto !important; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="site-title">AI 日报</div>
    </div>

    <button class="icon-btn" id="theme-toggle" type="button" aria-label="切换暗黑模式" title="切换主题">🌙</button>
  </div>
</header>

<main>
  <div class="module" id="module" style="display:none">
    <div class="module-head" aria-label="日期切换">
      <div class="date-nav">
        <span class="seg" role="group" aria-label="快捷日期">
          <button id="quick-all" type="button">全部</button>
          <button id="quick-today" type="button" class="active">今日</button>
          <button id="quick-yesterday" type="button">昨日</button>
          <button id="quick-week" type="button">本周</button>
        </span>

        <input class="date-picker" id="date-picker" type="date" aria-label="快速选择日期">
        <span class="range-pill" id="range-label" style="display:none" aria-label="时间范围"></span>
      </div>
    </div>

    <details class="filters" id="filters">
      <summary aria-label="展开筛选">
        <div class="summary-left">
          <span class="summary-title">筛选</span>
        </div>
        <div class="summary-right">
          <span class="chev" aria-hidden="true">⌄</span>
        </div>
      </summary>

      <div class="filters-body">
        <div class="row">
          <span class="label">搜索</span>
          <input class="search-input" id="search-input" type="search" placeholder="搜索标题、摘要、标签、来源" autocomplete="off">
        </div>
        <div class="row">
          <span class="label">排序</span>
          <select class="date-picker" id="sort-select" aria-label="选择排序方式" style="min-width: 160px">
            <option value="importance" selected>重要性优先</option>
            <option value="time">时间优先</option>
          </select>
        </div>
        <div class="row" id="tag-filter-row">
          <span class="label">标签</span>
        </div>
        <div class="row" id="source-filter-row">
          <span class="label">来源</span>
        </div>
        <div class="row">
          <span class="label">更新</span>
          <span class="muted" id="updated-at">—</span>
        </div>
      </div>
    </details>
  </div>

  <div id="content">
    <div class="loading">正在加载数据…</div>
  </div>
</main>

<footer>
  Powered by <a href="https://kingcos.me" target="_blank" rel="noopener">kingcos.me</a> with ❤️ and 🦞
</footer>

<script>
  const INDEX_URL = './data/index.json';
  const BEIJING_TZ = 'Asia/Shanghai';

  let indexMeta = null;
  let currentDate = null;
  let allItems = [];
  let viewMode = 'day'; // 'day' | 'week' | 'all'
  let sortMode = 'importance'; // 'importance' | 'time'
  const dayCache = new Map(); // date -> daily json

  let activeFilters = { tag: null, source: null, search: '' };

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatDateTimeCN(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      return new Intl.DateTimeFormat('zh-CN', {
        timeZone: BEIJING_TZ,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).format(d);
    } catch {
      return String(iso);
    }
  }

  function formatHM(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      return new Intl.DateTimeFormat('zh-CN', {
        timeZone: BEIJING_TZ,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).format(d);
    } catch { return ''; }
  }

  function impClass(n) {
    return 'imp-' + Math.max(1, Math.min(5, Math.round(n || 3)));
  }

  function buildSearchText(item) {
    return [
      item.title_zh || '',
      item.title_en || '',
      item.summary_zh || '',
      item.summary_en || '',
      item.source_name || '',
      (item.tags || []).join(' ')
    ].join(' ').toLowerCase();
  }

  function renderCard(item) {
    const hasBothLang = item.summary_en && item.summary_zh;
    const titleMain = item.title_zh || item.title_en || '（无标题）';
    const titleSub = item.title_zh && item.title_en ? item.title_en : '';
    const summaryZH = item.summary_zh || '';
    const summaryEN = item.summary_en || '';

    const tagsHtml = (item.tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');

    const zhId = 'zh-' + item.id;
    const enId = 'en-' + item.id;

    return `
<div class="card"
  data-tags="${escHtml((item.tags || []).join(','))}"
  data-source="${escHtml(item.source_name || '')}"
  data-search="${escHtml(buildSearchText(item))}">
  <div class="imp-badge ${impClass(item.importance)}" title="重要性 ${item.importance || 3}/5"></div>
  <div class="card-body">
    <div class="card-head">
      <div style="min-width:0">
        <div class="card-title">
          <a href="${escHtml(item.source_url || '#')}" target="_blank" rel="noopener">${escHtml(titleMain)}</a>
        </div>
        ${titleSub ? `<div class="card-title-en">${escHtml(titleSub)}</div>` : ''}
      </div>
      ${hasBothLang ? `<button class="toggle-lang" aria-label="切换中英文摘要" title="切换中英文" onclick="toggleLang('${item.id}')">🌐</button>` : ''}
    </div>

    ${summaryZH ? `<div class="card-summary" id="${zhId}">${escHtml(summaryZH)}</div>` : ''}
    ${summaryEN ? `<div class="card-summary hidden" id="${enId}">${escHtml(summaryEN)}</div>` : ''}

    <div class="card-footer">
      ${tagsHtml}
      ${item.published_at ? `<span class=\"card-date\">${formatHM(item.published_at)}</span>` : ''}
      <span class="card-source"><a href="${escHtml(item.source_url || '#')}" target="_blank" rel="noopener">${escHtml(item.source_name || '')}</a></span>
    </div>
  </div>
</div>`;
  }

  function toggleLang(id) {
    const zh = document.getElementById('zh-' + id);
    const en = document.getElementById('en-' + id);
    if (!zh || !en) return;
    const showingZH = !zh.classList.contains('hidden');
    zh.classList.toggle('hidden', showingZH);
    en.classList.toggle('hidden', !showingZH);
  }

  function updateActiveBadge() {
    // removed: visual count pill (per UI preference)
    return;
  }

  function applyFilters() {
    const cards = document.querySelectorAll('.card');
    const keyword = activeFilters.search.trim().toLowerCase();
    let visibleCount = 0;

    cards.forEach(card => {
      const tags = (card.dataset.tags || '').split(',').filter(Boolean);
      const source = card.dataset.source || '';
      const searchable = card.dataset.search || '';

      const tagOk = !activeFilters.tag || tags.includes(activeFilters.tag);
      const srcOk = !activeFilters.source || source === activeFilters.source;
      const searchOk = !keyword || searchable.includes(keyword);

      const isVisible = tagOk && srcOk && searchOk;
      card.style.display = isVisible ? '' : 'none';
      if (isVisible) visibleCount += 1;
    });

    const emptyId = 'filter-empty-state';
    let emptyNode = document.getElementById(emptyId);
    if (!visibleCount) {
      if (!emptyNode) {
        emptyNode = document.createElement('div');
        emptyNode.id = emptyId;
        emptyNode.className = 'empty-state';
        emptyNode.innerHTML = '<h2>没有匹配结果</h2><p>试试清空搜索词，或放宽标签/来源筛选。</p>';
        document.getElementById('content').appendChild(emptyNode);
      }
    } else if (emptyNode) {
      emptyNode.remove();
    }

    updateActiveBadge();
  }

  function buildFilters(items) {
    const tags = new Set();
    const sources = new Set();
    items.forEach(item => {
      (item.tags || []).forEach(t => tags.add(t));
      if (item.source_name) sources.add(item.source_name);
    });

    if (activeFilters.tag && !tags.has(activeFilters.tag)) activeFilters.tag = null;
    if (activeFilters.source && !sources.has(activeFilters.source)) activeFilters.source = null;

    const tagRow = document.getElementById('tag-filter-row');
    const srcRow = document.getElementById('source-filter-row');
    tagRow.innerHTML = '<span class="label">标签</span>';
    srcRow.innerHTML = '<span class="label">来源</span>';

    const allTagChip = document.createElement('span');
    allTagChip.className = 'chip' + (!activeFilters.tag ? ' active' : '');
    allTagChip.dataset.filter = 'tag';
    allTagChip.dataset.value = 'all';
    allTagChip.textContent = '全部';
    tagRow.appendChild(allTagChip);

    [...tags].sort().forEach(t => {
      const c = document.createElement('span');
      c.className = 'chip' + (activeFilters.tag === t ? ' active' : '');
      c.dataset.filter = 'tag';
      c.dataset.value = t;
      c.textContent = t;
      tagRow.appendChild(c);
    });

    const allSrcChip = document.createElement('span');
    allSrcChip.className = 'chip' + (!activeFilters.source ? ' active' : '');
    allSrcChip.dataset.filter = 'source';
    allSrcChip.dataset.value = 'all';
    allSrcChip.textContent = '全部';
    srcRow.appendChild(allSrcChip);

    [...sources].sort().forEach(s => {
      const c = document.createElement('span');
      c.className = 'chip' + (activeFilters.source === s ? ' active' : '');
      c.dataset.filter = 'source';
      c.dataset.value = s;
      c.textContent = s;
      srcRow.appendChild(c);
    });

    updateActiveBadge();
  }

  function syncDatePicker() {
    const dp = document.getElementById('date-picker');
    const range = document.getElementById('range-label');

    if (viewMode === 'day') {
      if (dp) {
        dp.style.display = '';
        dp.value = currentDate || '';
      }
      if (range) range.style.display = 'none';
      return;
    }

    // week/all modes
    if (dp) dp.style.display = 'none';
    if (!range) return;

    if (viewMode === 'all') {
      const dates = indexMeta?.dates || [];
      const newest = dates[0];
      const oldest = dates[dates.length - 1];
      range.textContent = dates.length ? `${oldest} → ${newest}` : '—';
    } else if (viewMode === 'week') {
      const weekDates = getWeekDates(getTodayDate());
      const newest = weekDates[0];
      const oldest = weekDates[weekDates.length - 1];
      range.textContent = weekDates.length ? `${oldest} → ${newest}` : '—';
    }

    range.style.display = '';
  }

  function setSubtitle(text) {
    // Header subtitle removed per UI preference.
    document.title = text ? `AI 日报 · ${text}` : 'AI 日报';
  }

  function setQuickActive(which) {
    const ids = ['quick-all','quick-today','quick-yesterday','quick-week'];
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('active');
    });
    const target = document.getElementById(which);
    if (target) target.classList.add('active');
  }

  function dateToYMDInBeijing(d) {
    // format in Beijing TZ as YYYY-MM-DD
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: BEIJING_TZ,
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    }).formatToParts(d);
    const get = (t) => parts.find(p => p.type === t)?.value;
    return `${get('year')}-${get('month')}-${get('day')}`;
  }

  function getTodayDate() {
    // “今日” = calendar today in Beijing, not latest generated date.
    return dateToYMDInBeijing(new Date());
  }

  function getYesterdayDate() {
    const y = new Date();
    // subtract 1 day in local clock; we only care about date parts in Beijing.
    y.setDate(y.getDate() - 1);
    const candidate = dateToYMDInBeijing(y);
    return candidate;
  }

  function getWeekDates(anchorDate) {
    const dates = indexMeta?.dates || [];
    if (!anchorDate) return [];
    // parse as UTC midnight
    const [y,m,d] = anchorDate.split('-').map(Number);
    const anchor = new Date(Date.UTC(y, m - 1, d));
    const day = anchor.getUTCDay(); // 0-6 (Sun-Sat)
    const diffToMonday = (day + 6) % 7; // Monday=0
    const monday = new Date(anchor);
    monday.setUTCDate(anchor.getUTCDate() - diffToMonday);
    const sunday = new Date(monday);
    sunday.setUTCDate(monday.getUTCDate() + 6);

    const within = [];
    dates.forEach(dt => {
      const [yy,mm,dd] = dt.split('-').map(Number);
      const x = new Date(Date.UTC(yy, mm - 1, dd));
      if (x >= monday && x <= sunday) within.push(dt);
    });
    return within;
  }

  function render(data) {
    const items = (data.items || []).slice().sort((a, b) => {
      const ia = a.importance || 0, ib = b.importance || 0;
      if (ib !== ia) return ib - ia;
      const da = a.published_at ? new Date(a.published_at) : 0;
      const db = b.published_at ? new Date(b.published_at) : 0;
      return db - da;
    });

    currentDate = data.date || currentDate;
    allItems = items;

    const updated = indexMeta?.updated_at ? `更新：${formatDateTimeCN(indexMeta.updated_at)}（北京）` : '';
    document.getElementById('updated-at').textContent = updated || '—';

    setSubtitle(currentDate ? currentDate : 'AI 日报');

    document.getElementById('module').style.display = '';
    syncDatePicker();
    buildFilters(items);

    const content = document.getElementById('content');
    if (!items.length) {
      content.innerHTML = `
        <div class="empty-state">
          <h2>暂无新闻数据</h2>
          <p>运行 AI 日报流水线以生成数据。</p>
        </div>`;
      return;
    }

    content.innerHTML = `<div class="items-list">${items.map(renderCard).join('')}</div>`;
    applyFilters();
  }

  function initThemeToggle() {
    const button = document.getElementById('theme-toggle');

    const getCurrentTheme = () => {
      if (document.documentElement.dataset.theme === 'dark') return 'dark';
      if (document.documentElement.dataset.theme === 'light') return 'light';
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    };

    const syncIcon = () => {
      const t = getCurrentTheme();
      // show the action icon (what you can switch to)
      button.textContent = t === 'dark' ? '☀️' : '🌙';
    };

    button.addEventListener('click', () => {
      const current = getCurrentTheme();
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('ai-daily-theme', next);
      syncIcon();
    });

    syncIcon();
  }

  function initSearch() {
    const input = document.getElementById('search-input');
    input.addEventListener('input', () => {
      activeFilters.search = input.value;
      applyFilters();
    });
  }

  function initSort() {
    const sel = document.getElementById('sort-select');
    if (!sel) return;
    sel.addEventListener('change', async () => {
      sortMode = sel.value === 'time' ? 'time' : 'importance';
      // Re-render current view
      if (viewMode === 'all') {
        await showAll();
        return;
      }
      if (viewMode === 'week') {
        await showWeek();
        return;
      }
      await switchToDate(currentDate || getTodayDate());
    });
  }

  function initChipFilters() {
    document.getElementById('filters').addEventListener('click', (event) => {
      const chip = event.target.closest('.chip');
      if (!chip) return;

      const filterType = chip.dataset.filter;
      const value = chip.dataset.value;

      document.querySelectorAll(`.chip[data-filter="${filterType}"]`).forEach(c => c.classList.remove('active'));
      chip.classList.add('active');

      if (filterType === 'tag') activeFilters.tag = value === 'all' ? null : value;
      if (filterType === 'source') activeFilters.source = value === 'all' ? null : value;

      applyFilters();
    });
  }

  function sortItems(items) {
    const arr = (items || []).slice();
    const getTime = (x) => x?.published_at ? new Date(x.published_at).getTime() : 0;
    if (sortMode === 'time') {
      return arr.sort((a, b) => {
        const ta = getTime(a), tb = getTime(b);
        if (tb !== ta) return tb - ta;
        return (b.importance || 0) - (a.importance || 0);
      });
    }
    // default: importance
    return arr.sort((a, b) => {
      const ia = a.importance || 0, ib = b.importance || 0;
      if (ib !== ia) return ib - ia;
      return getTime(b) - getTime(a);
    });
  }

  async function fetchDaily(date) {
    if (dayCache.has(date)) return dayCache.get(date);
    const res = await fetch(`./data/${date}.json`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    dayCache.set(date, data);
    return data;
  }

  function renderNoDataForDate(date) {
    viewMode = 'day';
    currentDate = date;
    document.getElementById('module').style.display = '';
    syncDatePicker();
    buildFilters([]);
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <h2>暂无新闻数据</h2>
        <p>${escHtml(date)} 暂无数据。</p>
      </div>`;
    setSubtitle('AI 日报');
  }

  function renderDay(daily) {
    viewMode = 'day';
    currentDate = daily?.date || currentDate;
    allItems = sortItems(daily?.items || []);

    const updated = indexMeta?.updated_at ? `更新：${formatDateTimeCN(indexMeta.updated_at)}（北京）` : '';
    document.getElementById('updated-at').textContent = updated || '—';

    document.getElementById('module').style.display = '';
    syncDatePicker();
    buildFilters(allItems);

    const content = document.getElementById('content');
    if (!allItems.length) {
      content.innerHTML = `
        <div class="empty-state">
          <h2>暂无新闻数据</h2>
          <p>${escHtml(currentDate)} 暂无数据。</p>
        </div>`;
      return;
    }

    content.innerHTML = `<div class="items-list">${allItems.map(renderCard).join('')}</div>`;
    applyFilters();
  }

  function renderSections(sectionDates, byDateItems) {
    // sectionDates: array in display order (newest -> oldest)
    const sections = sectionDates.map(d => ({ date: d, items: sortItems(byDateItems.get(d) || []) }));
    const flat = [];
    sections.forEach(s => flat.push(...s.items));
    allItems = flat;

    const updated = indexMeta?.updated_at ? `更新：${formatDateTimeCN(indexMeta.updated_at)}（北京）` : '';
    document.getElementById('updated-at').textContent = updated || '—';

    document.getElementById('module').style.display = '';
    syncDatePicker();
    buildFilters(flat);

    const html = sections.map(s => {
      const count = s.items.length;
      return `
        <section class="day-section">
          <div class="day-header">
            <div class="day-title">${escHtml(s.date)}</div>
            <div class="day-sub">${count ? `${count} 条` : '暂无数据'}</div>
          </div>
          <div class="items-list">${(s.items.length ? s.items.map(renderCard).join('') : '')}</div>
        </section>`;
    }).join('');

    document.getElementById('content').innerHTML = html || `
      <div class="empty-state">
        <h2>暂无新闻数据</h2>
        <p>当前范围暂无数据。</p>
      </div>`;

    applyFilters();
  }

  async function switchToDate(date) {
    // Selecting a date should jump to that date, even if empty.
    viewMode = 'day';
    currentDate = date;
    syncDatePicker();
    setUrlState?.({ mode: 'day', date });

    const dates = new Set(indexMeta?.dates || []);
    if (!dates.has(date)) {
      renderNoDataForDate(date);
      return;
    }

    try {
      const daily = await fetchDaily(date);
      renderDay(daily);
    } catch (err) {
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <h2>日期数据加载失败</h2>
          <p>${escHtml(date)} 加载失败，请稍后重试。</p>
          <p style="margin-top:8px;font-size:0.85rem;opacity:0.7">${escHtml(err.message)}</p>
        </div>`;
    }
  }

  async function showAll() {
    viewMode = 'all';
    currentDate = getTodayDate();
    syncDatePicker();
    setUrlState?.({ mode: 'all', date: null });

    const dates = indexMeta?.dates || [];
    const byDateItems = new Map();

    await Promise.all(dates.map(async (d) => {
      try {
        const daily = await fetchDaily(d);
        byDateItems.set(d, daily?.items || []);
      } catch {
        byDateItems.set(d, []);
      }
    }));

    renderSections(dates, byDateItems);
  }

  async function showWeek() {
    viewMode = 'week';
    currentDate = getTodayDate();
    syncDatePicker();
    setUrlState?.({ mode: 'week', date: null });

    const weekDates = getWeekDates(getTodayDate());
    const byDateItems = new Map();

    await Promise.all(weekDates.map(async (d) => {
      try {
        const daily = await fetchDaily(d);
        byDateItems.set(d, daily?.items || []);
      } catch {
        byDateItems.set(d, []);
      }
    }));

    renderSections(weekDates, byDateItems);
  }

  function initDateNav() {
    const dp = document.getElementById('date-picker');

    document.getElementById('quick-all').addEventListener('click', async () => {
      // “全部” = 全量范围（按天分组）
      setQuickActive('quick-all');
      await showAll();
    });

    document.getElementById('quick-today').addEventListener('click', async () => {
      setQuickActive('quick-today');
      await switchToDate(getTodayDate());
    });

    document.getElementById('quick-yesterday').addEventListener('click', async () => {
      setQuickActive('quick-yesterday');
      await switchToDate(getYesterdayDate());
    });

    document.getElementById('quick-week').addEventListener('click', async () => {
      setQuickActive('quick-week');
      await showWeek();
    });

    dp.addEventListener('change', async () => {
      const picked = dp.value;
      if (!picked) return;
      // Selecting a date should always jump, even if empty.
      setQuickActive('quick-all');
      await switchToDate(picked);
    });
  }

  function getUrlState() {
    const u = new URL(window.location.href);
    const mode = u.searchParams.get('mode'); // day|week|all
    const date = u.searchParams.get('date'); // YYYY-MM-DD
    return { mode, date };
  }

  function setUrlState(next) {
    const u = new URL(window.location.href);
    if (next.mode) u.searchParams.set('mode', next.mode);
    else u.searchParams.delete('mode');
    if (next.date) u.searchParams.set('date', next.date);
    else u.searchParams.delete('date');
    history.replaceState(null, '', u.toString());
  }

  async function load() {
    try {
      initThemeToggle();
      initSearch();
      initSort();
      initChipFilters();

      const res = await fetch(INDEX_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      indexMeta = await res.json();

      const { mode, date } = getUrlState();
      initDateNav();

      if (mode === 'all') {
        setQuickActive('quick-all');
        await showAll();
        setUrlState({ mode: 'all', date: null });
        return;
      }

      if (mode === 'week') {
        setQuickActive('quick-week');
        await showWeek();
        setUrlState({ mode: 'week', date: null });
        return;
      }

      // Default view: calendar-today (Beijing). If URL provides a date, honor it.
      const target = date || getTodayDate();
      if (!target) {
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <h2>暂无新闻数据</h2>
            <p>今天暂无数据。</p>
          </div>`;
        return;
      }

      await switchToDate(target);
      setQuickActive(date ? 'quick-all' : 'quick-today');
      setUrlState({ mode: 'day', date: target });

    } catch (err) {
      setSubtitle('加载失败');
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <h2>数据加载失败</h2>
          <p>请确认 <code>docs/data/index.json</code> 已生成，或通过 GitHub Pages 访问本页面。</p>
          <p style="margin-top:8px;font-size:0.85rem;opacity:0.7">${escHtml(err.message)}</p>
        </div>`;
    }
  }

  load();
</script>
</body>
